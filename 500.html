<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('sb_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Error — SomBazar</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#fef6ee;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow:hidden}
    .bg{position:fixed;inset:0;background:linear-gradient(135deg,#1a0000 0%,#0f172a 50%,#1a0a0a 100%);z-index:-1}
    .orb1{position:fixed;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(239,68,68,.2) 0%,transparent 70%);pointer-events:none}
    .orb2{position:fixed;bottom:-100px;left:-100px;width:350px;height:350px;background:radial-gradient(circle,rgba(249,115,22,.15) 0%,transparent 70%);pointer-events:none}
    .card{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:56px 48px;max-width:520px;width:100%;animation:fadeUp .6s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .num{font-family:'Syne',sans-serif;font-size:120px;font-weight:900;line-height:1;background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;letter-spacing:-4px}
    h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:white;margin-bottom:12px}
    p{font-size:15px;color:rgba(255,255,255,.65);line-height:1.7;margin-bottom:36px}
    .links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn-home{background:#f97316;color:white;padding:13px 28px;border-radius:50px;text-decoration:none;font-weight:700;font-size:14px;transition:all .2s;box-shadow:0 4px 16px rgba(249,115,22,.4)}
    .btn-home:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(249,115,22,.5)}
    .btn-retry{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);padding:13px 24px;border-radius:50px;text-decoration:none;font-weight:600;font-size:14px;border:1px solid rgba(255,255,255,.15);transition:all .2s;cursor:pointer}
    .btn-retry:hover{background:rgba(255,255,255,.15)}
    .logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:900;color:#f97316;text-decoration:none;display:inline-block;margin-bottom:32px}
    .status-dot{display:inline-block;width:8px;height:8px;background:#ef4444;border-radius:50%;margin-right:8px;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .status-bar{display:inline-flex;align-items:center;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:50px;padding:6px 16px;font-size:12px;font-weight:600;color:rgba(255,255,255,.7);margin-bottom:20px}
  </style>
  <!-- Google Analytics GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6H7F8Y980M"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6H7F8Y980M', {
      'cookie_domain': 'sombazar-fixed-production.up.railway.app',
      'cookie_flags': 'SameSite=None;Secure'
    });
  </script>
  <!-- Google Search Console Verification -->
  <meta name="google-site-verification" content="y-q4wfmJgYhKGVPdYsvQcmUHlpwBKfqcRxQ4j5ao3Yw">
</head>
<body>
  <div class="bg"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="card">
    <a href="index.html" class="logo">SomBazar</a>
    <div class="status-bar"><span class="status-dot"></span>Service Disruption</div>
    <div class="num">500</div>
    <h1>Something Went Wrong</h1>
    <p>Our servers encountered an unexpected error. Our team has been notified and is working on a fix. Please try again in a few moments.</p>
    <div class="links">
      <a href="index.html" class="btn-home">← Go Home</a>
      <button class="btn-retry" onclick="window.location.reload()">Try Again</button>
    </div>
  </div>
<script src="assets/app.min.js"></script>
</body>
</html>
