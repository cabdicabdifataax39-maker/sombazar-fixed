            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span id="msgBadge" style="display:none;position:absolute;top:-4px;right:-4px;background:#f97316;color:white;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:8px;padding:0 3px;align-items:center;justify-content:center;line-height:1"></span>

        <!-- Bildirim Çanı -->
        <div style="position:relative" id="notifBtnWrap">

            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            <span id="notifBadge" style="display:none;position:absolute;top:-4px;right:-4px;background:#ef4444;color:white;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:8px;padding:0 3px;align-items:center;justify-content:center;line-height:1"></span>
          </button>

          <!-- Dropdown -->
          <div id="notifDropdown" style="display:none;position:absolute;top:calc(100% + 10px);right:0;width:320px;background:white;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.15);border:1px solid #f1f5f9;z-index:9999;overflow:hidden;max-height:420px;overflow-y:auto">
            <div style="padding:12px 14px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">
              <span style="font-weight:800;font-size:14px">Notifications</span>
              <button onclick="Notif.markAllRead()" style="background:none;border:none;color:#f97316;font-size:12px;font-weight:700;cursor:pointer">Mark all read</button>
            </div>
          </div>
        </div>

        <a href="profile.html" class="icon-btn header-avatar" aria-label="Profile" style="font-weight:800;font-size:14px;width:32px;height:32px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#f97316;color:white;flex-shrink:0;padding:0"></a>
      </div>
      <a href="post.html" class="btn-post-ad">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Post Ad
      </a>
    </div>
  </nav>
</header>

<script>
function toggleNotifDropdown() {
  const dd = document.getElementById('notifDropdown');
  if (!dd) return;
  const isOpen = dd.style.display !== 'none';
  dd.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) Notif.loadDropdown();
}
// Dışarı tıklanınca kapat
document.addEventListener('click', function(e) {
  const wrap = document.getElementById('notifBtnWrap');
  if (wrap && !wrap.contains(e.target)) {
    const dd = document.getElementById('notifDropdown');
    if (dd) dd.style.display = 'none';
  }
});
</script>
