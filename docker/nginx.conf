worker_processes 1;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        root /var/www/html;
        index index.php index.html;

        # HTML dosyalari - hic cache etme
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Statik dosyalar - 1 gun cache
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg)$ {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Hassas dosyaları engelle
    location ~* /(make_admin|admin_debug|run_migration|migrate_images|migrate|check_images)\.php$ {
        deny all;
        return 404;
    }

    location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location ~ /\.ht {
            deny all;
        }
    }
}
