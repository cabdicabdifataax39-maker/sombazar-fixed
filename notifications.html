<script src="assets/app.min.js"></script>
<script>
const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
if (!user) window.location.href = 'auth.html?redirect=notifications.html';

let allNotifs = [];
let currentFilter = 'all';
let page = 1;
const PAGE_SIZE = 30;

const typeConfig = {
  message:          { emoji:'💬', bg:'#eff6ff', color:'#3b82f6', label:'Message' },
  offer:            { emoji:'💰', bg:'#fff7ed', color:'#f97316', label:'Offer' },
  offer_accepted:   { emoji:'✅', bg:'#f0fdf4', color:'#22c55e', label:'Offer Accepted' },
  offer_rejected:   { emoji:'❌', bg:'#fef2f2', color:'#ef4444', label:'Offer Rejected' },
  offer_counter:    { emoji:'↩️', bg:'#faf5ff', color:'#a855f7', label:'Counter Offer' },
  review:           { emoji:'⭐', bg:'#fffbeb', color:'#f59e0b', label:'Review' },
  listing:          { emoji:'📦', bg:'#f0fdf4', color:'#10b981', label:'Listing' },
  reservation:      { emoji:'🔖', bg:'#fef6ee', color:'#ec5b13', label:'Reservation' },
  reservation_confirmed: { emoji:'✅', bg:'#f0fdf4', color:'#22c55e', label:'Reservation' },
  reservation_rejected:  { emoji:'❌', bg:'#fef2f2', color:'#ef4444', label:'Reservation' },
  store_verification:    { emoji:'🏪', bg:'#fef6ee', color:'#ec5b13', label:'Store' },
  store_status:          { emoji:'🏪', bg:'#fef6ee', color:'#ec5b13', label:'Store' },
  system:           { emoji:'ℹ️', bg:'#f8fafc', color:'#64748b', label:'System' },
};

function getTypeConfig(type) {
  // Prefix match
  const key = Object.keys(typeConfig).find(k => type === k || type?.startsWith(k.split('_')[0]));
  return typeConfig[type] || typeConfig[key] || typeConfig.system;
}

async function loadNotifications() {
  document.getElementById('notifLoading').style.display = 'block';
  document.getElementById('notifList').style.display = 'none';
  document.getElementById('notifEmpty').style.display = 'none';

  try {
    const token = localStorage.getItem('sb_token') || '';
    const r = await fetch('/api/notifications.php?action=list&limit=100', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const d = await r.json();

    document.getElementById('notifLoading').style.display = 'none';

    if (!d.success) { document.getElementById('notifEmpty').style.display = 'block'; return; }

    allNotifs = d.data.notifications || [];
    const unread = allNotifs.filter(n => !n.isRead).length;

    if (unread > 0) {
      const badge = document.getElementById('unreadBadge');
      badge.textContent = unread + ' unread';
      badge.style.display = 'inline-block';
      document.getElementById('markAllBtn').style.display = 'block';
    }

    renderNotifs();

  } catch(e) {
    document.getElementById('notifLoading').style.display = 'none';
    document.getElementById('notifEmpty').style.display = 'block';
  }
}

function renderNotifs() {
  const filtered = currentFilter === 'all'
    ? allNotifs
    : allNotifs.filter(n => n.type?.includes(currentFilter));

  const listEl = document.getElementById('notifList');
  listEl.innerHTML = '';

  if (!filtered.length) {
    listEl.style.display = 'none';
    document.getElementById('notifEmpty').style.display = 'block';
    return;
  }

  document.getElementById('notifEmpty').style.display = 'none';
  listEl.style.display = 'block';

  filtered.slice(0, page * PAGE_SIZE).forEach(n => {
    const cfg = getTypeConfig(n.type);
    const el = document.createElement('a');
    el.href = n.link || '#';
    el.className = 'notif-item' + (n.isRead ? '' : ' unread');
    el.onclick = () => markRead(n.id);
    el.innerHTML = `
      <div class="notif-icon" style="background:${cfg.bg};color:${cfg.color};">${cfg.emoji}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:${n.isRead?'600':'800'};color:var(--text-primary);margin-bottom:2px;">${n.title || ''}</div>
        ${n.body ? `<div style="font-size:12px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${n.body}</div>` : ''}
        <div style="font-size:11px;color:#94a3b8;margin-top:4px;">${n.timeAgo || ''}</div>
      </div>
      ${!n.isRead ? '<div style="width:8px;height:8px;background:#ec5b13;border-radius:50%;flex-shrink:0;margin-top:6px;"></div>' : ''}
    `;
    listEl.appendChild(el);
  });

  const total = filtered.length;
  document.getElementById('loadMoreWrap').style.display = total > page * PAGE_SIZE ? 'block' : 'none';
}

function setFilter(filter, btn) {
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = filter;
  page = 1;
  renderNotifs();
}

function loadMore() {
  page++;
  renderNotifs();
}

async function markRead(id) {
  const token = localStorage.getItem('sb_token') || '';
  await fetch('/api/notifications.php?action=mark_read', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ notification_id: id })
  }).catch(() => {});
  const n = allNotifs.find(x => x.id === id);
  if (n) n.isRead = true;
}

async function markAllRead() {
  const token = localStorage.getItem('sb_token') || '';
  await fetch('/api/notifications.php?action=mark_all_read', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token }
  });
  allNotifs.forEach(n => n.isRead = true);
  document.getElementById('unreadBadge').style.display = 'none';
  document.getElementById('markAllBtn').style.display = 'none';
  renderNotifs();
  showToast('All notifications marked as read', 'success');
}

loadNotifications();
</script>
