<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — SomBazar</title>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',system-ui,sans-serif;background:#fef6ee;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:white;border-radius:24px;padding:48px 40px;max-width:420px;width:100%;text-align:center;box-shadow:0 4px 40px rgba(0,0,0,.08);border:1px solid #e2e8f0}
    .icon{width:80px;height:80px;background:#fff7ed;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
    h1{font-size:22px;font-weight:800;color:#0f172a;margin-bottom:10px}
    p{font-size:14px;color:#64748b;line-height:1.6;margin-bottom:24px}
    .logo{font-family:'Syne',sans-serif;font-weight:900;font-size:24px;color:#f97316;margin-bottom:32px;display:block}
    .btn{display:inline-flex;align-items:center;gap:8px;background:#f97316;color:white;border:none;border-radius:12px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;transition:background .2s}
    .btn:hover{background:#ea580c}
    .tip{margin-top:20px;font-size:12px;color:#94a3b8;line-height:1.6}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .pulse{animation:pulse 2s infinite}
  </style>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Syne:wght@900&display=swap" rel="stylesheet">
  <!-- Google Analytics GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6H7F8Y980M"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6H7F8Y980M', {
      'cookie_domain': 'sombazar-fixed-production.up.railway.app',
      'cookie_flags': 'SameSite=None;Secure'
    });
  </script>
  <!-- Google Search Console Verification -->
  <meta name="google-site-verification" content="y-q4wfmJgYhKGVPdYsvQcmUHlpwBKfqcRxQ4j5ao3Yw">
</head>
<body>
  <div class="card">
    <span class="logo">SomBazar</span>
    <div class="icon">
      <svg class="pulse" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Please check your network and try again.</p>
    <button class="btn" onclick="retry()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Try Again
    </button>
    <p class="tip">
      Some pages may still be available from cache.<br>
      Try browsing to <a href="index.html" style="color:#f97316">the homepage</a>.
    </p>
  </div>
  <script>
    function retry() {
      if (navigator.onLine) {
        window.location.reload();
      } else {
        const btn = document.querySelector('.btn');
        btn.textContent = 'Still offline…';
        setTimeout(() => { btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Try Again'; }, 2000);
      }
    }
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
