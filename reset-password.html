<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — SomBazar</title>
  <link rel="stylesheet" href="assets/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    .input-wrap{position:relative}
    .input-wrap .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--gray);padding:0}
  </style>
  <!-- Google Analytics GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6H7F8Y980M"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6H7F8Y980M');
  </script>
  <!-- Google Search Console Verification -->
  <meta name="google-site-verification" content="y-q4wfmJgYhKGVPdYsvQcmUHlpwBKfqcRxQ4j5ao3Yw">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card animate-slide-up">
    <div class="auth-header">
      <a href="index.html" class="auth-logo" style="text-decoration:none">SomBazar</a>
    </div>
    <div class="auth-body">
      <div id="tokenInvalid" style="display:none;text-align:center;padding:20px 0">
        <div style="font-size:48px;margin-bottom:12px">✕</div>
        <div style="font-size:16px;font-weight:700;color:var(--dark);margin-bottom:8px">Invalid or Expired Link</div>
        <p style="font-size:13px;color:var(--gray);margin-bottom:20px">This reset link has expired or already been used.</p>
        <a href="auth.html" class="btn btn-primary">Request New Link</a>
      </div>

      <div id="resetForm">
        <h2 style="font-size:20px;font-weight:800;color:var(--dark);margin-bottom:6px">Set New Password</h2>
        <p style="font-size:13px;color:var(--gray);margin-bottom:20px">Choose a strong password for your account.</p>

        <div id="msgError"   style="display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#b91c1c"></div>
        <div id="msgSuccess" style="display:none;background:#f0fdf4;border:1px solid #a7f3d0;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#065f46"></div>

        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="newPass" placeholder="Min. 6 characters" style="padding-right:44px">
            <button type="button" class="eye-btn" onclick="togglePass('newPass',this)">️</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="confirmPass" placeholder="Repeat new password" style="padding-right:44px">
            <button type="button" class="eye-btn" onclick="togglePass('confirmPass',this)">️</button>
          </div>
        </div>
        <button class="btn btn-primary btn-full" id="submitBtn" onclick="submitReset()">Reset Password</button>
        <p style="text-align:center;margin-top:14px"><a href="auth.html" style="color:var(--gray);font-size:13px">← Back to Sign In</a></p>
      </div>
    </div>
  </div>
</div>
<script>
// Fallback: app.js yüklenemezse Auth crash'i önle
window.Auth = window.Auth || {
  getToken: () => localStorage.getItem('sb_token') || '',
  getUser:  () => { try { return JSON.parse(localStorage.getItem('sb_user')); } catch(e) { return null; } },
  isLoggedIn: () => !!localStorage.getItem('sb_token'),
  setSession: (token, user) => { localStorage.setItem("sb_token", token); localStorage.setItem("sb_user", JSON.stringify(user)); },
  clearSession: () => { localStorage.removeItem('sb_token'); localStorage.removeItem('sb_user'); }
};
window.API = window.API || {};
</script>
  <script src="assets/app.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('resetForm').style.display = 'none';
  document.getElementById('tokenInvalid').style.display = '';
}

function togglePass(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '️' : '';
}

async function submitReset() {
  const newPass     = document.getElementById('newPass').value;
  const confirmPass = document.getElementById('confirmPass').value;
  const errEl  = document.getElementById('msgError');
  const succEl = document.getElementById('msgSuccess');
  errEl.style.display = succEl.style.display = 'none';

  if (newPass.length < 6) { errEl.textContent = '!️ Password must be at least 6 characters'; errEl.style.display=''; return; }
  if (newPass !== confirmPass) { errEl.textContent = '!️ Passwords do not match'; errEl.style.display=''; return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Resetting…';

  try {
    const res = await API.resetPassword(token, newPass, confirmPass);
    succEl.textContent = '✓ ' + res.message;
    succEl.style.display = '';
    document.getElementById('resetForm').querySelectorAll('input,button').forEach(el => el.disabled = true);
    setTimeout(() => window.location.href = 'auth.html', 2000);
  } catch(err) {
    errEl.textContent = '!️ ' + (err.message || 'Failed to reset password');
    errEl.style.display = '';
    btn.disabled = false;
    btn.textContent = 'Reset Password';
    if (err.message && err.message.includes('expired')) {
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('tokenInvalid').style.display = '';
    }
  }
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
