<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('sb_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews — SomBazar</title>
  <meta name="description" content="Seller reviews on SomBazar" id="metaDesc">
  <link rel="preload" href="assets/style.min.css" as="style">
  <link rel="preload" href="assets/app.min.js" as="script">
  <link rel="stylesheet" href="assets/style.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    .review-card { background:var(--bg-card);border:1px solid var(--border-color);border-radius:14px;padding:16px;margin-bottom:12px; }
    .stars { color:#f59e0b;font-size:16px;letter-spacing:1px; }
    .rating-bar-wrap { display:flex;align-items:center;gap:8px;margin-bottom:6px; }
    .rating-bar { flex:1;height:6px;background:var(--border-color);border-radius:3px;overflow:hidden; }
    .rating-bar-fill { height:100%;background:#f59e0b;border-radius:3px;transition:width .4s; }
    .write-btn { background:#ec5b13;color:white;border:none;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px; }
    .modal-bg { display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:16px; }
    .star-btn { background:none;border:none;font-size:28px;cursor:pointer;padding:4px;transition:transform .1s;line-height:1; }
    .star-btn:hover { transform:scale(1.2); }
  </style>
</head>
<body>

<header class="header">
  <nav class="nav-container">
    <a href="index.html" class="logo">SomBazar</a>
    <div class="header-actions" id="headerActions"></div>
  </nav>
</header>

<main style="max-width:680px;margin:24px auto;padding:0 16px 60px;">

  <!-- Seller Info -->
  <div id="sellerInfo" style="display:flex;align-items:center;gap:14px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:16px;padding:20px;margin-bottom:20px;">
    <div id="sellerAvatarWrap"></div>
    <div style="flex:1;">
      <div id="sellerName" style="font-size:18px;font-weight:900;color:var(--text-primary);"></div>
      <div id="sellerMeta" style="font-size:13px;color:#64748b;margin-top:2px;"></div>
    </div>
    <div style="text-align:center;">
      <div id="avgRating" style="font-size:28px;font-weight:900;color:#f59e0b;"></div>
      <div style="font-size:11px;color:#64748b;font-weight:600;">out of 5</div>
    </div>
  </div>

  <!-- Rating Summary -->
  <div id="ratingSummary" style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:16px;padding:20px;margin-bottom:20px;display:none;">
    <h3 style="font-size:14px;font-weight:800;color:var(--text-primary);margin-bottom:12px;">Rating Breakdown</h3>
    <div id="ratingBars"></div>
  </div>

  <!-- Write Review Button -->
  <div id="writeReviewWrap" style="display:none;margin-bottom:16px;">
    <button class="write-btn" onclick="openReviewModal()">
      <span class="material-symbols-outlined" style="font-size:18px;">rate_review</span>
      Write a Review
    </button>
  </div>

  <!-- Reviews List -->
  <div id="reviewsList"></div>

  <div id="reviewsLoading" style="text-align:center;padding:40px;color:#94a3b8;font-size:13px;">
    Loading reviews...
  </div>

  <div id="reviewsEmpty" style="display:none;text-align:center;padding:60px 20px;">
    <div style="font-size:48px;margin-bottom:12px;">⭐</div>
    <h3 style="font-size:16px;font-weight:800;color:var(--text-primary);margin-bottom:6px;">No reviews yet</h3>
    <p style="font-size:13px;color:#64748b;">Be the first to review this seller</p>
  </div>

</main>

<!-- Write Review Modal -->
<div id="reviewModal" class="modal-bg">
  <div style="background:var(--bg-card);border-radius:20px;padding:24px;width:100%;max-width:420px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3 style="font-size:17px;font-weight:900;color:var(--text-primary);margin:0;">Write a Review</h3>
      <button onclick="closeReviewModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#94a3b8;line-height:1;">✕</button>
    </div>

    <!-- Star Rating -->
    <div style="text-align:center;margin-bottom:16px;">
      <p style="font-size:13px;color:#64748b;margin-bottom:8px;">How would you rate this seller?</p>
      <div id="starSelector" style="display:flex;justify-content:center;gap:4px;">
        <button class="star-btn" onclick="setRating(1)" data-star="1">☆</button>
        <button class="star-btn" onclick="setRating(2)" data-star="2">☆</button>
        <button class="star-btn" onclick="setRating(3)" data-star="3">☆</button>
        <button class="star-btn" onclick="setRating(4)" data-star="4">☆</button>
        <button class="star-btn" onclick="setRating(5)" data-star="5">☆</button>
      </div>
      <p id="ratingLabel" style="font-size:12px;color:#94a3b8;margin-top:6px;">Select a rating</p>
    </div>

    <textarea id="reviewComment" rows="4" placeholder="Share your experience with this seller..." style="width:100%;border:1.5px solid var(--border-color);border-radius:10px;padding:10px 12px;font-size:13px;outline:none;resize:none;font-family:inherit;background:var(--input-bg);color:var(--text-primary);box-sizing:border-box;" maxlength="500"></textarea>
    <div style="font-size:11px;color:#94a3b8;text-align:right;margin-top:3px;"><span id="charCount">0</span>/500</div>

    <div id="reviewError" style="display:none;background:#fee2e2;color:#dc2626;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;margin-top:10px;"></div>

    <div style="display:flex;gap:8px;margin-top:16px;">
      <button onclick="closeReviewModal()" style="flex:1;background:#f1f5f9;color:#374151;border:none;padding:11px;border-radius:11px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;">Cancel</button>
      <button id="submitReviewBtn" onclick="submitReview()" style="flex:2;background:#ec5b13;color:white;border:none;padding:11px;border-radius:11px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;">Submit Review</button>
    </div>
  </div>
</div>

<script src="assets/app.min.js"></script>
<script>
const sellerId = parseInt(getParam('seller_id') || '0');
let selectedRating = 0;
let canReview = false;
let firstListingId = null;

const ratingLabels = ['','Terrible','Poor','Average','Good','Excellent'];

async function loadReviews() {
  if (!sellerId) {
    document.getElementById('reviewsLoading').textContent = 'No seller specified';
    return;
  }

  try {
    const r = await fetch('/api/reviews.php?action=get_seller&seller_id=' + sellerId);
    const d = await r.json();
    document.getElementById('reviewsLoading').style.display = 'none';

    if (!d.success) { document.getElementById('reviewsEmpty').style.display = 'block'; return; }

    const { seller, reviews, average, count, breakdown } = d.data;

    // Seller info
    document.title = (seller?.display_name || 'Seller') + ' Reviews — SomBazar';
    document.getElementById('metaDesc').content = 'Reviews for ' + (seller?.display_name || 'seller') + ' on SomBazar';

    const avatarEl = document.getElementById('sellerAvatarWrap');
    if (seller?.avatar_url || seller?.photo_url) {
      avatarEl.innerHTML = `<img src="${seller.avatar_url || seller.photo_url}" style="width:56px;height:56px;border-radius:50%;object-fit:cover;">`;
    } else {
      const initial = (seller?.display_name || 'S')[0].toUpperCase();
      avatarEl.innerHTML = `<div style="width:56px;height:56px;border-radius:50%;background:#ec5b13;display:flex;align-items:center;justify-content:center;color:white;font-size:20px;font-weight:900;">${initial}</div>`;
    }

    document.getElementById('sellerName').textContent = seller?.display_name || 'Seller';
    document.getElementById('sellerMeta').textContent = count + ' review' + (count !== 1 ? 's' : '') + (seller?.city ? ' · ' + seller.city : '');
    document.getElementById('avgRating').textContent = average > 0 ? parseFloat(average).toFixed(1) : '—';

    // Rating bars
    if (count > 0 && breakdown) {
      document.getElementById('ratingSummary').style.display = 'block';
      const barsEl = document.getElementById('ratingBars');
      [5,4,3,2,1].forEach(star => {
        const cnt = breakdown[star] || 0;
        const pct = count > 0 ? Math.round((cnt/count)*100) : 0;
        barsEl.innerHTML += `
          <div class="rating-bar-wrap">
            <span style="font-size:12px;font-weight:700;color:var(--text-secondary);width:12px;">${star}</span>
            <span style="font-size:12px;">⭐</span>
            <div class="rating-bar"><div class="rating-bar-fill" style="width:${pct}%"></div></div>
            <span style="font-size:12px;color:#64748b;font-weight:600;width:28px;text-align:right;">${cnt}</span>
          </div>`;
      });
    }

    // Reviews
    if (!reviews || !reviews.length) {
      document.getElementById('reviewsEmpty').style.display = 'block';
    } else {
      const listEl = document.getElementById('reviewsList');
      reviews.forEach(rv => {
        const stars = '★'.repeat(rv.rating) + '☆'.repeat(5 - rv.rating);
        const ago = rv.created_at ? timeSince(new Date(rv.created_at)) : '';
        const avatar = rv.reviewer_photo
          ? `<img src="${rv.reviewer_photo}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">`
          : `<div style="width:36px;height:36px;border-radius:50%;background:#ec5b13;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:800;">${(rv.reviewer_name||'?')[0].toUpperCase()}</div>`;

        listEl.innerHTML += `
          <div class="review-card">
            <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;">
              ${avatar}
              <div style="flex:1;">
                <div style="font-weight:700;font-size:13px;color:var(--text-primary);">${rv.reviewer_name || 'Anonymous'}</div>
                <div style="display:flex;align-items:center;gap:8px;margin-top:2px;">
                  <span class="stars" style="font-size:14px;">${stars}</span>
                  <span style="font-size:11px;color:#94a3b8;">${ago}</span>
                </div>
              </div>
            </div>
            ${rv.comment ? `<p style="font-size:13px;color:#64748b;line-height:1.6;margin:0;">${rv.comment}</p>` : ''}
            ${rv.listing_title ? `<div style="font-size:11px;color:#94a3b8;margin-top:6px;">📦 ${rv.listing_title}</div>` : ''}
          </div>`;

        if (!firstListingId && rv.listing_id) firstListingId = rv.listing_id;
      });
    }

    // Can review?
    const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
    if (user && user.id !== sellerId) {
      document.getElementById('writeReviewWrap').style.display = 'block';
    }

  } catch(e) {
    document.getElementById('reviewsLoading').style.display = 'none';
    document.getElementById('reviewsEmpty').style.display = 'block';
  }
}

function setRating(n) {
  selectedRating = n;
  document.querySelectorAll('.star-btn').forEach((btn, i) => {
    btn.textContent = i < n ? '★' : '☆';
    btn.style.color = i < n ? '#f59e0b' : '#94a3b8';
  });
  document.getElementById('ratingLabel').textContent = ratingLabels[n] || '';
  document.getElementById('ratingLabel').style.color = '#f59e0b';
}

function openReviewModal() {
  const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
  if (!user) { window.location.href = 'auth.html?redirect=' + encodeURIComponent(location.href); return; }
  document.getElementById('reviewModal').style.display = 'flex';
}

function closeReviewModal() {
  document.getElementById('reviewModal').style.display = 'none';
  document.getElementById('reviewError').style.display = 'none';
}

document.getElementById('reviewComment').addEventListener('input', function() {
  document.getElementById('charCount').textContent = this.value.length;
});

async function submitReview() {
  if (!selectedRating) {
    document.getElementById('reviewError').textContent = 'Please select a rating';
    document.getElementById('reviewError').style.display = 'block';
    return;
  }

  if (!firstListingId) {
    document.getElementById('reviewError').textContent = 'No listing found to review';
    document.getElementById('reviewError').style.display = 'block';
    return;
  }

  const btn = document.getElementById('submitReviewBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const token = localStorage.getItem('sb_token') || '';
    const r = await fetch('/api/reviews.php?action=submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({
        listing_id: firstListingId,
        rating: selectedRating,
        comment: document.getElementById('reviewComment').value.trim()
      })
    });
    const d = await r.json();

    if (d.success) {
      closeReviewModal();
      showToast('Review submitted! ✅', 'success');
      setTimeout(() => location.reload(), 1500);
    } else {
      document.getElementById('reviewError').textContent = d.error || 'Failed to submit';
      document.getElementById('reviewError').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('reviewError').textContent = 'Network error. Try again.';
    document.getElementById('reviewError').style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Submit Review';
}

loadReviews();
</script>
</body>
</html>
