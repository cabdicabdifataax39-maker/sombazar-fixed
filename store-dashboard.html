<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('sb_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Dashboard — SomBazar</title>
  <link rel="stylesheet" href="assets/style.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:"#ec5b13"},fontFamily:{sans:["Public Sans","sans-serif"]}}}}</script>
  <style>
    .stat-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:16px;padding:20px;text-align:center;}
    .stat-num{font-size:28px;font-weight:900;color:var(--text-primary);}
    .stat-lbl{font-size:12px;color:#64748b;font-weight:600;margin-top:4px;}
    .section-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:16px;padding:20px;margin-bottom:16px;}
    .hours-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-color);}
    .hours-row:last-child{border-bottom:none;}
    .day-label{width:100px;font-size:13px;font-weight:700;color:var(--text-primary);}
    .time-input{border:1.5px solid var(--border-color);border-radius:8px;padding:5px 8px;font-size:13px;background:var(--input-bg);color:var(--text-primary);font-family:inherit;}
    .badge-verif{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;}
  </style>
</head>
<body>

<header class="header">
  <nav class="nav-container">
    <a href="index.html" class="logo">SomBazar</a>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
      <a href="" id="viewStoreLink" target="_blank" style="padding:7px 14px;border-radius:9px;border:1.5px solid var(--border-color);font-size:13px;font-weight:700;text-decoration:none;color:var(--text-primary);">View Store ↗</a>
      <a href="store-edit.html" style="padding:7px 14px;border-radius:9px;background:#ec5b13;color:white;font-size:13px;font-weight:800;text-decoration:none;">Edit Store</a>
    </div>
  </nav>
</header>

<main style="max-width:960px;margin:24px auto;padding:0 16px 60px;">

  <!-- Store Header -->
  <div class="section-card" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
    <img id="dashLogo" src="" alt="Logo" style="width:64px;height:64px;border-radius:12px;object-fit:cover;background:#f1f5f9;" onerror="this.style.display='none'">
    <div style="flex:1;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <h1 id="dashStoreName" style="font-size:20px;font-weight:900;color:var(--text-primary);margin:0;"></h1>
        <span id="dashVerifBadge" class="badge-verif" style="display:none;"></span>
      </div>
      <div id="dashMeta" style="font-size:13px;color:#64748b;margin-top:4px;"></div>
    </div>
    <div id="dashOpenStatus" style="font-size:13px;font-weight:700;padding:6px 12px;border-radius:20px;"></div>
  </div>

  <!-- Stats Grid -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:16px;">
    <div class="stat-card"><div class="stat-num" id="sActive">—</div><div class="stat-lbl">Active Listings</div></div>
    <div class="stat-card"><div class="stat-num" id="sWeekViews">—</div><div class="stat-lbl">Views (7 days)</div></div>
    <div class="stat-card"><div class="stat-num" id="sMonthOffers">—</div><div class="stat-lbl">Offers (30 days)</div></div>
    <div class="stat-card"><div class="stat-num" id="sFollowers">—</div><div class="stat-lbl">Followers</div></div>
    <div class="stat-card"><div class="stat-num" id="sRating">—</div><div class="stat-lbl">Rating</div></div>
  </div>

  <!-- Top Listings -->
  <div class="section-card">
    <h3 style="font-size:15px;font-weight:800;margin-bottom:14px;color:var(--text-primary);">Top Listings (by views)</h3>
    <div id="topListings" style="font-size:13px;color:#94a3b8;">Loading...</div>
  </div>

  <!-- Working Hours -->
  <div class="section-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <h3 style="font-size:15px;font-weight:800;color:var(--text-primary);margin:0;">Working Hours</h3>
      <button onclick="saveHours()" id="saveHoursBtn" style="background:#ec5b13;color:white;border:none;padding:7px 16px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;">Save Hours</button>
    </div>
    <div id="hoursGrid"></div>
  </div>

  <!-- Verification Status -->
  <div class="section-card" id="verifCard">
    <h3 style="font-size:15px;font-weight:800;margin-bottom:10px;color:var(--text-primary);">Store Verification</h3>
    <div id="verifContent" style="font-size:13px;color:#64748b;">Loading...</div>
  </div>

</main>

<script src="assets/app.min.js"></script>
<script>
const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
if (!user) window.location.href = 'auth.html?redirect=store-dashboard.html';

const DAYS = [
  ['mon','Monday'],['tue','Tuesday'],['wed','Wednesday'],
  ['thu','Thursday'],['fri','Friday'],['sat','Saturday'],['sun','Sunday']
];

let storeData = null;

async function loadDashboard() {
  try {
    const store = await apiFetch('/api/stores.php?action=my_store');
    if (!store || !store.id) {
      document.querySelector('main').innerHTML = '<div style="text-align:center;padding:60px;"><h2>No store found</h2><a href="store-setup.html" style="color:#ec5b13;font-weight:700;">Create a Store →</a></div>';
      return;
    }
    storeData = store;

    // Header
    if (storeData.logo_url) document.getElementById('dashLogo').src = storeData.logo_url;
    document.getElementById('dashStoreName').textContent = storeData.store_name;
    document.getElementById('viewStoreLink').href = 'store.html?slug=' + storeData.slug;

    // Verification badge
    const verifBadge = document.getElementById('dashVerifBadge');
    const verifMap = {
      unverified: {bg:'#f1f5f9',color:'#64748b',label:'Not Verified'},
      pending:    {bg:'#fef9c3',color:'#854d0e',label:'⏳ Pending'},
      verified:   {bg:'#dcfce7',color:'#15803d',label:'✅ Verified'},
      rejected:   {bg:'#fee2e2',color:'#dc2626',label:'❌ Rejected'},
    };
    const v = verifMap[storeData.verification_status] || verifMap.unverified;
    verifBadge.style.cssText = `display:inline-flex;background:${v.bg};color:${v.color};`;
    verifBadge.textContent = v.label;

    // Meta
    const metas = [];
    if (storeData.city) metas.push('📍 ' + storeData.city);
    if (storeData.store_type) metas.push(storeData.store_type.replace('_',' '));
    if (storeData.plan) metas.push('Plan: ' + storeData.plan.toUpperCase());
    document.getElementById('dashMeta').textContent = metas.join('  ·  ');

    // Open status
    if (storeData.open_status) {
      const el = document.getElementById('dashOpenStatus');
      el.textContent = (storeData.open_status.is_open ? '🟢 ' : '🔴 ') + storeData.open_status.label;
      el.style.background = storeData.open_status.is_open ? '#dcfce7' : '#fee2e2';
      el.style.color = storeData.open_status.is_open ? '#15803d' : '#dc2626';
    }

    // Working hours
    renderHoursEditor(storeData.working_hours);

    // Analytics
    loadAnalytics();

    // Verification card
    renderVerifCard();

  } catch(e) {
    console.error(e);
  }
}

async function loadAnalytics() {
  try {
    const d = await apiFetch('/api/stores.php?action=analytics');
    if (!d) return;
    document.getElementById('sActive').textContent = d.active_listings || 0;
    document.getElementById('sWeekViews').textContent = d.weekly_views || 0;
    document.getElementById('sMonthOffers').textContent = d.monthly_offers || 0;
    document.getElementById('sFollowers').textContent = d.follower_count || 0;
    document.getElementById('sRating').textContent = storeData?.avg_rating > 0 ? parseFloat(storeData.avg_rating).toFixed(1) + ' ⭐' : '—';

    // Top listings
    const top = d.top_listings || [];
    const el = document.getElementById('topListings');
    if (!top.length) { el.textContent = 'No listings yet'; return; }
    el.innerHTML = top.map((l,i) => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-color);">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:18px;font-weight:900;color:#94a3b8;width:20px;">${i+1}</span>
          <a href="listing.html?id=${l.id}" style="font-weight:700;font-size:13px;color:var(--text-primary);text-decoration:none;">${l.title}</a>
        </div>
        <span style="font-size:12px;color:#64748b;font-weight:600;">👁 ${l.view_count || 0}</span>
      </div>`).join('');
  } catch(e) {}
}

function renderHoursEditor(hours) {
  const grid = document.getElementById('hoursGrid');
  grid.innerHTML = DAYS.map(([key, label]) => {
    const h = hours?.[key];
    const closed = !h || h.closed;
    return `<div class="hours-row">
      <div class="day-label">${label}</div>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
        <input type="checkbox" id="closed_${key}" ${closed ? 'checked' : ''} onchange="toggleDayClosed('${key}')" style="accent-color:#ec5b13;">
        <span style="color:#64748b;font-size:12px;">Closed</span>
      </label>
      <div id="times_${key}" style="${closed ? 'display:none;' : ''}display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <input type="time" class="time-input" id="open_${key}" value="${h?.open || '09:00'}">
        <span style="font-size:12px;color:#94a3b8;">to</span>
        <input type="time" class="time-input" id="close_${key}" value="${h?.close || '18:00'}">
      </div>
    </div>`;
  }).join('');
}

function toggleDayClosed(key) {
  const isClosed = document.getElementById('closed_' + key).checked;
  const timesEl  = document.getElementById('times_' + key);
  timesEl.style.display = isClosed ? 'none' : 'flex';
}

async function saveHours() {
  const btn = document.getElementById('saveHoursBtn');
  btn.disabled = true; btn.textContent = 'Saving...';

  const hours = {};
  DAYS.forEach(([key]) => {
    const closed = document.getElementById('closed_' + key).checked;
    if (closed) {
      hours[key] = { closed: true };
    } else {
      hours[key] = {
        closed: false,
        open:  document.getElementById('open_' + key).value || '09:00',
        close: document.getElementById('close_' + key).value || '18:00',
      };
    }
  });

  try {
    const res = await apiFetch('/api/stores.php?action=working_hours', {
      method: 'POST',
      body: JSON.stringify({ hours })
    });
    showToast('Working hours saved! ✅', 'success');
  } catch(e) { showToast('Network error', 'error'); }

  btn.disabled = false; btn.textContent = 'Save Hours';
}

function renderVerifCard() {
  const el = document.getElementById('verifContent');
  const v = storeData?.verification_status || 'unverified';

  if (v === 'verified') {
    el.innerHTML = '<p style="color:#15803d;font-weight:700;">✅ Your store is verified! Buyers trust verified stores.</p>';
  } else if (v === 'pending') {
    el.innerHTML = '<p style="color:#854d0e;font-weight:700;">⏳ Your verification request is under review (up to 72 hours).</p>';
  } else if (v === 'rejected') {
    el.innerHTML = `<p style="color:#dc2626;font-weight:700;margin-bottom:10px;">❌ Verification rejected.</p>
      <button onclick="requestVerification()" style="background:#ec5b13;color:white;border:none;padding:8px 16px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;">Apply Again</button>`;
  } else {
    el.innerHTML = `<p style="margin-bottom:10px;">Get verified to build trust with buyers and appear higher in search results.</p>
      <button onclick="requestVerification()" style="background:#ec5b13;color:white;border:none;padding:8px 16px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;">Request Verification</button>`;
  }
}

async function requestVerification() {
  try {
    const res = await apiFetch('/api/stores.php?action=verify_request', {
      method: 'POST',
      body: JSON.stringify({ level: 'business' })
    });
    showToast('Verification request submitted! ✅', 'success');
    storeData.verification_status = 'pending'; renderVerifCard();
  } catch(e) { showToast('Network error', 'error'); }
}

loadDashboard();
</script>
</body>
</html>
