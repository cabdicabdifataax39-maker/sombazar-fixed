<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('sb_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ec5b13">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Store — SomBazar</title>
  <meta name="description" content="Browse this store on SomBazar" id="metaDesc">
  <meta id="ogTitle" property="og:title" content="SomBazar Store">
  <meta id="ogDesc" property="og:description" content="Browse listings on SomBazar">
  <link rel="preload" href="assets/style.min.css" as="style">
  <link rel="stylesheet" href="assets/style.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    /* ── Reset & Base ─────────────────────────── */
    * { box-sizing: border-box; }

    /* ── Hero Cover ─────────────────────────────── */
    .sp-hero {
      position: relative;
      width: 100%;
      height: 300px;
      overflow: hidden;
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
    }
    @media(max-width:640px){ .sp-hero { height: 210px; } }

    .sp-hero-img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .sp-hero-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,.55) 100%);
      pointer-events: none;
    }

    /* ── Avatar ─────────────────────────────────── */
    .sp-avatar-wrap {
      position: absolute;
      bottom: -40px; left: 28px;
      z-index: 5;
    }
    @media(max-width:640px){ .sp-avatar-wrap { left: 16px; bottom: -34px; } }

    .sp-avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 4px solid var(--bg-primary, #fff);
      object-fit: cover;
      background: #e2e8f0;
      display: block;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
    }
    .sp-avatar-fallback {
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 4px solid var(--bg-primary, #fff);
      background: linear-gradient(135deg, #ec5b13, #f97316);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: 900; color: white;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
    }
    @media(max-width:640px){ .sp-avatar, .sp-avatar-fallback { width: 80px; height: 80px; } }
    [data-theme="dark"] .sp-avatar,
    [data-theme="dark"] .sp-avatar-fallback { border-color: #0f172a; }

    /* ── Header actions (Follow/Share) on hero ──── */
    .sp-hero-actions {
      position: absolute;
      bottom: 16px; right: 20px;
      display: flex; gap: 8px;
      z-index: 5;
    }

    .sp-btn-follow {
      padding: 9px 20px; border-radius: 8px;
      font-size: 13px; font-weight: 800;
      cursor: pointer; border: none;
      background: #ec5b13; color: white;
      display: none; align-items: center; gap: 6px;
      font-family: inherit; transition: opacity .15s;
      letter-spacing: .2px;
    }
    .sp-btn-follow:hover { opacity: .88; }
    .sp-btn-follow.following {
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.4);
      backdrop-filter: blur(8px);
    }

    .sp-btn-share {
      width: 38px; height: 38px;
      border-radius: 8px; border: 1.5px solid rgba(255,255,255,.4);
      background: rgba(255,255,255,.12); color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(8px);
      transition: background .15s;
    }
    .sp-btn-share:hover { background: rgba(255,255,255,.25); }

    .sp-btn-msg {
      padding: 9px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 800;
      cursor: pointer;
      border: 1.5px solid rgba(255,255,255,.4);
      background: rgba(255,255,255,.12); color: white;
      display: none; align-items: center; gap: 6px;
      font-family: inherit; backdrop-filter: blur(8px);
      transition: background .15s;
    }
    .sp-btn-msg:hover { background: rgba(255,255,255,.25); }

    /* ── Body wrapper ───────────────────────────── */
    .sp-body {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    @media(max-width:640px){ .sp-body { padding: 0 14px 80px; } }

    /* ── Info Section ───────────────────────────── */
    .sp-info {
      padding-top: 52px;
      margin-bottom: 20px;
    }
    @media(max-width:640px){ .sp-info { padding-top: 44px; } }

    .sp-name {
      font-size: 28px; font-weight: 900;
      color: var(--text-primary);
      letter-spacing: -.5px; line-height: 1.15;
      margin: 0 0 6px;
    }
    @media(max-width:640px){ .sp-name { font-size: 22px; } }

    .sp-verified {
      display: inline-flex; align-items: center; gap: 4px;
      background: #dcfce7; color: #16a34a;
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
      vertical-align: middle; margin-left: 8px;
    }

    .sp-meta {
      display: flex; flex-wrap: wrap; gap: 12px;
      font-size: 12px; color: #64748b;
      margin-bottom: 8px;
    }
    .sp-meta-item { display: flex; align-items: center; gap: 4px; }

    .sp-open {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      margin-bottom: 12px;
    }
    .sp-open.open  { background: #dcfce7; color: #16a34a; }
    .sp-open.closed{ background: #fee2e2; color: #dc2626; }

    .sp-desc {
      font-size: 14px; color: #64748b;
      line-height: 1.6; margin-bottom: 18px;
      max-width: 560px;
    }

    /* ── Stats Row ─────────────────────────────── */
    .sp-stats {
      display: flex; gap: 0;
      border: 1px solid var(--border-color);
      border-radius: 14px; overflow: hidden;
      margin-bottom: 22px;
      background: var(--bg-card);
    }
    .sp-stat {
      flex: 1; text-align: center;
      padding: 16px 8px;
      border-right: 1px solid var(--border-color);
    }
    .sp-stat:last-child { border-right: none; }
    .sp-stat-num {
      display: block;
      font-size: 24px; font-weight: 900;
      color: var(--text-primary); line-height: 1.1;
    }
    .sp-stat-lbl {
      display: block;
      font-size: 10px; font-weight: 700;
      color: #94a3b8; text-transform: uppercase;
      letter-spacing: .8px; margin-top: 3px;
    }

    /* ── Tabs ──────────────────────────────────── */
    .sp-tabs {
      display: flex; gap: 4px;
      border-bottom: 2px solid var(--border-color);
      margin-bottom: 22px;
    }
    .sp-tab {
      padding: 10px 18px;
      font-size: 13px; font-weight: 700;
      border: none; background: transparent;
      color: #94a3b8; cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-family: inherit;
      transition: color .15s, border-color .15s;
    }
    .sp-tab.active { color: #ec5b13; border-bottom-color: #ec5b13; }
    .sp-tab:hover:not(.active) { color: var(--text-primary); }

    /* ── Listings Grid ─────────────────────────── */
    .sp-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media(max-width:700px){ .sp-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }

    .sp-card {
      border-radius: 14px; overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      text-decoration: none; display: block;
      transition: transform .2s, box-shadow .2s;
      position: relative;
    }
    .sp-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,.1); }

    .sp-card-img-wrap { position: relative; overflow: hidden; }
    .sp-card-img {
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover; display: block;
      transition: transform .4s;
    }
    .sp-card:hover .sp-card-img { transform: scale(1.04); }
    .sp-card-img-placeholder {
      width: 100%; aspect-ratio: 4/3;
      background: var(--bg-secondary);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
    }

    .sp-price-badge {
      position: absolute; bottom: 10px; right: 10px;
      background: #ec5b13; color: white;
      font-size: 13px; font-weight: 800;
      padding: 4px 10px; border-radius: 8px;
    }
    .sp-featured-badge {
      position: absolute; top: 8px; left: 8px;
      background: #f59e0b; color: white;
      font-size: 9px; font-weight: 800;
      padding: 3px 7px; border-radius: 5px;
      text-transform: uppercase; letter-spacing: .4px;
    }
    .sp-heart {
      position: absolute; top: 8px; right: 8px;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,.9);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; transition: transform .15s;
      backdrop-filter: blur(4px); color: #64748b;
    }
    .sp-heart:hover { transform: scale(1.2); color: #ec5b13; }
    .sp-heart.faved { color: #ec5b13; }

    .sp-card-body { padding: 10px 12px 12px; }
    .sp-card-title {
      font-size: 13px; font-weight: 700;
      color: var(--text-primary); line-height: 1.3;
      margin-bottom: 4px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .sp-card-location {
      font-size: 11px; color: #94a3b8;
      display: flex; align-items: center; gap: 3px;
    }

    /* ── Load More ─────────────────────────────── */
    .sp-load-more {
      display: block; width: 100%;
      padding: 13px; margin-top: 20px;
      border: 1.5px solid var(--border-color);
      border-radius: 12px; background: var(--bg-card);
      color: var(--text-primary); font-size: 13px;
      font-weight: 700; cursor: pointer;
      font-family: inherit; transition: border-color .15s, color .15s;
    }
    .sp-load-more:hover { border-color: #ec5b13; color: #ec5b13; }

    /* ── About Tab ─────────────────────────────── */
    .sp-about-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 14px; padding: 20px;
      margin-bottom: 14px;
    }
    .sp-about-card h3 {
      font-size: 12px; font-weight: 800;
      color: #94a3b8; margin: 0 0 14px;
      text-transform: uppercase; letter-spacing: .7px;
    }
    .sp-hours-row {
      display: flex; justify-content: space-between;
      align-items: center; padding: 7px 0;
      font-size: 13px;
      border-bottom: 1px solid var(--border-color);
    }
    .sp-hours-row:last-child { border-bottom: none; }
    .sp-hours-row.today { font-weight: 800; }

    /* ── Loading spinner ───────────────────────── */
    .sp-spinner {
      display: flex; justify-content: center;
      align-items: center; padding: 50px;
    }
    .sp-spinner-dot {
      width: 22px; height: 22px;
      border: 2.5px solid #ec5b13;
      border-top-color: transparent;
      border-radius: 50%;
      animation: sp-spin .7s linear infinite;
    }
    @keyframes sp-spin { to { transform: rotate(360deg); } }

    /* ── Empty State ───────────────────────────── */
    .sp-empty {
      text-align: center; padding: 60px 20px;
    }
    .sp-empty-icon { font-size: 48px; margin-bottom: 12px; }
    .sp-empty h3 {
      font-size: 16px; font-weight: 800;
      color: var(--text-primary); margin-bottom: 6px;
    }
    .sp-empty p { font-size: 13px; color: #64748b; }

    /* ── Scroll to top ─────────────────────────── */
    #scrollTopBtn {
      position: fixed; bottom: 24px; right: 24px;
      width: 40px; height: 40px; border-radius: 50%;
      background: #ec5b13; color: white; border: none;
      cursor: pointer; display: none;
      align-items: center; justify-content: center;
      font-size: 18px; box-shadow: 0 4px 16px rgba(236,91,19,.35);
      z-index: 99; transition: opacity .2s;
    }
    #scrollTopBtn:hover { opacity: .85; }
  </style>
</head>
<body>

<!-- Navbar -->
<header class="header">
  <nav class="nav-container">
    <a href="index.html" class="logo">SomBazar</a>
    <div class="header-actions" id="headerActions"></div>
  </nav>
</header>

<!-- Hero -->
<div class="sp-hero" id="storeHero">
  <img id="storeCoverImg" class="sp-hero-img" src="" alt="" style="display:none;" onerror="this.style.display='none'">
  <div class="sp-hero-gradient"></div>

  <!-- Avatar -->
  <div class="sp-avatar-wrap">
    <img id="storeLogoImg" class="sp-avatar" src="" alt="logo" style="display:none;">
    <div id="storeLogoFb" class="sp-avatar-fallback" style="display:none;"></div>
  </div>

  <!-- Action buttons on hero -->
  <div class="sp-hero-actions">
    <button id="msgStoreBtn" class="sp-btn-msg" onclick="startStoreChat()">
      <span class="material-symbols-outlined" style="font-size:16px;">chat</span>
      Message
    </button>
    <button id="followBtn" class="sp-btn-follow" onclick="toggleFollow()">
      <span class="material-symbols-outlined" style="font-size:16px;" id="followIcon">add</span>
      <span id="followText">Follow</span>
    </button>
    <button class="sp-btn-share" onclick="shareStore()" title="Share">
      <span class="material-symbols-outlined" style="font-size:18px;">share</span>
    </button>
  </div>
</div>

<!-- Body -->
<div class="sp-body">

  <!-- Info -->
  <div class="sp-info">
    <h1 class="sp-name">
      <span id="storeNameText"></span>
      <span id="storeVerifiedBadge" class="sp-verified" style="display:none;">✅ Verified</span>
    </h1>
    <div class="sp-meta" id="storeMeta"></div>
    <div id="storeOpenStatus"></div>
    <p class="sp-desc" id="storeDesc"></p>
  </div>

  <!-- Stats -->
  <div class="sp-stats">
    <div class="sp-stat">
      <span class="sp-stat-num" id="statListings">—</span>
      <span class="sp-stat-lbl">Listings</span>
    </div>
    <div class="sp-stat">
      <span class="sp-stat-num" id="statFollowers">—</span>
      <span class="sp-stat-lbl">Followers</span>
    </div>
    <div class="sp-stat">
      <span class="sp-stat-num" id="statRating">—</span>
      <span class="sp-stat-lbl">Rating</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="sp-tabs">
    <button class="sp-tab active" onclick="switchTab('listings',this)">Listings</button>
    <button class="sp-tab" onclick="switchTab('about',this)">About</button>
  </div>

  <!-- Listings -->
  <div id="tabListings">
    <div class="sp-grid" id="listingsGrid"></div>
    <div class="sp-spinner" id="listingsLoading"><div class="sp-spinner-dot"></div></div>
    <div class="sp-empty" id="listingsEmpty" style="display:none;">
      <div class="sp-empty-icon">📦</div>
      <h3>No active listings</h3>
      <p>This store hasn't posted any listings yet.</p>
    </div>
    <button class="sp-load-more" id="loadMoreBtn" onclick="loadMoreListings()" style="display:none;">
      Load More Listings
    </button>
  </div>

  <!-- About -->
  <div id="tabAbout" style="display:none;">
    <div class="sp-about-card">
      <h3>Working Hours</h3>
      <div id="workingHoursTable"></div>
    </div>
    <div class="sp-about-card" id="locationCard" style="display:none;">
      <h3>Location</h3>
      <p id="storeAddressText" style="font-size:13px;color:#64748b;margin:0;"></p>
    </div>
  </div>

</div>

<!-- Scroll to top -->
<button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script src="assets/app.min.js"></script>
<script>
const STORE_API = '/api/stores.php';
let storeId = null;
let storeSlug = null;
let currentPage = 1;
let totalPages = 1;
let storeOwnerId = null;
let isFollowingStore = false;

async function loadStore() {
  const slug = getParam('slug') || getParam('id');
  if (!slug) {
    document.querySelector('.store-hero').innerHTML = '<div style="text-align:center;padding:80px;color:white;"><h2>Store not found</h2><a href="index.html" style="color:#ec5b13;">Go Home</a></div>';
    return;
  }
  storeSlug = slug;

  try {
    const paramKey = isNaN(slug) ? 'slug' : 'id';
    const _r = await fetch('/api/stores.php?action=get&' + paramKey + '=' + encodeURIComponent(slug));
    const _j = await _r.json();
    if (!_j.success) { showError('Store not found'); return; }
    const s = _j.data;

    storeId = s.id;
    storeOwnerId = s.owner_id;
    isFollowingStore = !!s.is_following;

    // Meta
    document.title = s.store_name + ' — SomBazar';
    document.getElementById('metaDesc').content = s.description || ('Browse ' + s.store_name + ' on SomBazar');
    document.getElementById('ogTitle').content = s.store_name + ' — SomBazar';
    document.getElementById('ogDesc').content = s.description || ('Browse ' + s.store_name + ' on SomBazar');

    // Cover
    if (s.cover_url) {
      const img = document.getElementById('storeCoverImg');
      img.src = s.cover_url;
      img.style.display = 'block';
    }

    // Logo
    const initial = (s.store_name || 'S')[0].toUpperCase();
    if (s.logo_url) {
      const logoImg = document.getElementById('storeLogoImg');
      logoImg.src = s.logo_url;
      logoImg.style.display = 'block';
      logoImg.onerror = function() {
        this.style.display = 'none';
        showFallbackLogo(initial);
      };
    } else {
      showFallbackLogo(initial);
    }

    // Name
    document.getElementById('storeNameText').textContent = s.store_name;
    if (s.verification_status === 'verified') {
      document.getElementById('storeVerifiedBadge').style.display = 'inline-flex';
    }

    // Meta row
    const metaEl = document.getElementById('storeMeta');
    if (s.city) metaEl.innerHTML += `<span class="store-meta-item">📍 ${s.city}</span>`;
    if (s.store_type) metaEl.innerHTML += `<span class="store-meta-item">🏪 ${s.store_type.charAt(0).toUpperCase() + s.store_type.slice(1).replace('_',' ')}</span>`;
    if (s.phone) metaEl.innerHTML += `<span class="store-meta-item">📞 ${s.phone}</span>`;

    // Open status
    if (s.open_status) {
      const el = document.getElementById('storeOpenStatus');
      const isOpen = s.open_status.is_open;
      el.innerHTML = `<span class="open-badge ${isOpen ? 'open' : 'closed'}">${isOpen ? '🟢' : '🔴'} ${s.open_status.label}</span>`;
    }

    // Description
    if (s.description) document.getElementById('storeDesc').textContent = s.description;

    // Stats
    document.getElementById('statListings').textContent = s.listing_count || 0;
    document.getElementById('statFollowers').textContent = s.follower_count || 0;
    document.getElementById('statRating').textContent = s.avg_rating > 0 ? parseFloat(s.avg_rating).toFixed(1) + ' ⭐' : '—';

    // Follow/Message buttons
    const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
    if (user && user.id !== storeOwnerId) {
      const followBtn = document.getElementById('followBtn');
      followBtn.style.display = 'inline-flex';
      updateFollowBtn(isFollowingStore);
      document.getElementById('msgStoreBtn').style.display = 'inline-flex';
    }

    // Working hours
    renderWorkingHours(s.working_hours);

    // Address
    if (s.address_text) {
      document.getElementById('locationCard').style.display = 'block';
      document.getElementById('storeAddressText').textContent = s.address_text;
    }

    // Load listings
    loadListings();

  } catch(e) {
    showError('Failed to load store');
  }
}

function showFallbackLogo(initial) {
  const fb = document.getElementById('storeLogoFallback');
  fb.textContent = initial;
  fb.style.display = 'flex';
}

function updateFollowBtn(following) {
  const btn = document.getElementById('followBtn');
  if (following) {
    btn.className = 'btn-follow following';
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">check</span> Following';
  } else {
    btn.className = 'btn-follow';
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">add</span> Follow';
  }
}

async function loadListings(page = 1) {
  if (page === 1) {
    document.getElementById('listingsLoading').style.display = 'block';
    document.getElementById('listingsGrid').innerHTML = '';
  }

  try {
    const _lr = await fetch('/api/stores.php?action=listings&store_id=' + storeId + '&page=' + page + '&per_page=12');
    const _lj = await _lr.json();
    document.getElementById('listingsLoading').style.display = 'none';
    if (!_lj.success) return;

    const listings = _lj.data.listings || _lj.data || [];
    const tp = _lj.data.total_pages || 1;
    totalPages = tp;
    currentPage = page;

    if (page === 1 && listings.length === 0) {
      document.getElementById('listingsEmpty').style.display = 'block';
      return;
    }

    const grid = document.getElementById('listingsGrid');
    listings.forEach(l => {
      const imgs = Array.isArray(l.images) ? l.images : [];
      const img = imgs[0] || null;
      const price = l.price ? ('USD ' + parseFloat(l.price).toLocaleString()) : '';
      const isFeatured = l.featured || l.is_featured;
      const card = document.createElement('a');
      card.href = 'listing.html?id=' + l.id;
      card.className = 'listing-card-store';
      card.innerHTML = `
        <div class="listing-img-wrap">
          ${img
            ? `<img src="${img}" alt="${l.title || ''}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\'listing-img-placeholder\'>${catEmoji(l.category)}</div>'">`
            : `<div class="listing-img-placeholder">${catEmoji(l.category)}</div>`
          }
          ${isFeatured ? '<div class="listing-featured-badge">FEATURED</div>' : ''}
          ${price ? `<div class="listing-price-badge">${price}</div>` : ''}
          <button class="heart-btn" onclick="event.preventDefault();toggleFav(${l.id},this)" title="Save">♡</button>
        </div>
        <div class="listing-card-body">
          <div class="listing-card-title">${l.title || ''}</div>
          <div class="listing-card-meta">
            ${l.city ? `<span>📍 ${l.city}</span>` : ''}
            ${l.condition ? `<span>• ${l.condition}</span>` : ''}
          </div>
        </div>`;
      grid.appendChild(card);
    });

    document.getElementById('loadMoreBtn').style.display = currentPage < totalPages ? 'block' : 'none';

  } catch(e) {
    document.getElementById('listingsLoading').style.display = 'none';
  }
}

function loadMoreListings() { loadListings(currentPage + 1); }

async function toggleFollow() {
  const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
  if (!user) { window.location.href = 'auth.html?redirect=' + encodeURIComponent(location.href); return; }

  const action = isFollowingStore ? 'unfollow' : 'follow';
  try {
    const _r = await fetch('/api/stores.php?action=' + action, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('sb_token') || '') },
      body: JSON.stringify({ store_id: storeId })
    });
    const _j = await _r.json();
    if (_j.success) {
      isFollowingStore = !isFollowingStore;
      updateFollowBtn(isFollowingStore);
      const cnt = parseInt(document.getElementById('statFollowers').textContent) || 0;
      document.getElementById('statFollowers').textContent = cnt + (isFollowingStore ? 1 : -1);
      showToast(isFollowingStore ? '✅ Following this store' : 'Unfollowed', isFollowingStore ? 'success' : 'info');
    }
  } catch(e) { showToast('Error. Try again.', 'error'); }
}

async function startStoreChat() {
  const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
  if (!user) { window.location.href = 'auth.html?redirect=' + encodeURIComponent(location.href); return; }
  if (!storeOwnerId) return;
  try {
    const _r = await fetch('/api/messages.php?action=get_or_create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('sb_token') || '') },
      body: JSON.stringify({ otherUserId: storeOwnerId })
    });
    const _j = await _r.json();
    if (_j.success && _j.data && _j.data.conversationId) {
      window.location.href = 'messages.html?conv=' + _j.data.conversationId;
    }
  } catch(e) { showToast('Error starting chat', 'error'); }
}

function shareStore() {
  const url = location.href;
  if (navigator.share) {
    navigator.share({ title: document.getElementById('storeNameText').textContent, url });
  } else {
    navigator.clipboard.writeText(url).then(() => showToast('Link copied!', 'success'));
  }
}

async function toggleFav(id, btn) {
  const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
  if (!user) { window.location.href = 'auth.html'; return; }
  try {
    const _r = await fetch('/api/favorites.php?action=toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('sb_token') || '') },
      body: JSON.stringify({ listing_id: id })
    });
    const _j = await _r.json();
    if (_j.success) btn.textContent = _j.data && _j.data.favorited ? '♥' : '♡';
  } catch(e) {}
}

function renderWorkingHours(hours) {
  const el = document.getElementById('workingHoursTable');
  if (!hours) { el.innerHTML = '<p style="font-size:13px;color:#94a3b8;">Not specified</p>'; return; }
  const days = [['mon','Monday'],['tue','Tuesday'],['wed','Wednesday'],['thu','Thursday'],['fri','Friday'],['sat','Saturday'],['sun','Sunday']];
  const today = ['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];
  el.innerHTML = days.map(([key, label]) => {
    const h = hours[key];
    const isToday = key === today;
    const closed = !h || h.closed;
    const text = closed ? '<span style="color:#dc2626;">Closed</span>' : `<span style="color:#15803d;">${h.open} – ${h.close}</span>`;
    return `<div class="hours-row ${isToday ? 'today' : ''}">
      <span style="color:var(--text-primary);">${label}${isToday ? ' <span style="font-size:10px;background:#ec5b13;color:white;padding:1px 5px;border-radius:4px;">Today</span>' : ''}</span>
      ${text}
    </div>`;
  }).join('');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabListings').style.display = tab === 'listings' ? 'block' : 'none';
  document.getElementById('tabAbout').style.display = tab === 'about' ? 'block' : 'none';
}

function showError(msg) {
  document.querySelector('.store-hero').innerHTML = `<div style="text-align:center;padding:60px;color:white;"><div style="font-size:48px;margin-bottom:12px;">🏪</div><h2>${msg}</h2><a href="index.html" style="color:#ec5b13;font-weight:700;">← Go Home</a></div>`;
}

loadStore();
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTopBtn');
  if (btn) btn.style.display = window.scrollY > 400 ? 'flex' : 'none';
});
</script>
