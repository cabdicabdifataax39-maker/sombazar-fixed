<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function(){
      var t=localStorage.getItem('sb_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
      document.documentElement.setAttribute('data-theme',t);
    })();
  </script>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ec5b13">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Store — SomBazar</title>
  <meta name="description" content="Browse this store on SomBazar" id="metaDesc">
  <link rel="preload" href="assets/style.min.css" as="style">
  <link rel="stylesheet" href="assets/style.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: "#ec5b13" }, fontFamily: { sans: ["Public Sans","sans-serif"] } } }
    }
  </script>
  <style>
    .store-cover { width:100%;height:220px;object-fit:cover;background:#f1f5f9; }
    .store-logo-wrap { position:relative;margin-top:-50px;margin-left:20px;z-index:2; }
    .store-logo { width:90px;height:90px;border-radius:16px;border:3px solid white;background:#f1f5f9;object-fit:cover;box-shadow:0 4px 16px rgba(0,0,0,.12); }
    .store-badge { display:inline-flex;align-items:center;gap:4px;background:#dbeafe;color:#1d4ed8;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px; }
    .store-badge.verified { background:#dcfce7;color:#15803d; }
    .listing-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px; }
    @media(min-width:640px){.listing-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}}
    .tab-btn { padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:transparent;color:#64748b; }
    .tab-btn.active { background:#ec5b13;color:white; }
    [data-theme="dark"] .store-logo { border-color:#1e293b; }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <nav class="nav-container">
    <a href="index.html" class="logo">SomBazar</a>
    <div class="header-actions" id="headerActions"></div>
  </nav>
</header>

<main style="max-width:960px;margin:0 auto;padding-bottom:40px;">

  <!-- Cover -->
  <div style="position:relative;">
    <img id="storeCover" src="" alt="Store cover" class="store-cover" onerror="this.style.background='#f1f5f9';this.src=''">
    <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.3));pointer-events:none;"></div>
  </div>

  <!-- Logo + Info -->
  <div style="padding:0 16px;">
    <div class="store-logo-wrap">
      <img id="storeLogo" src="" alt="Store logo" class="store-logo" onerror="this.style.display='none'">
    </div>

    <div style="margin-top:10px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
      <div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <h1 id="storeName" style="font-size:22px;font-weight:900;color:var(--text-primary);margin:0;"></h1>
          <span id="storeVerifiedBadge" style="display:none;" class="store-badge verified">✅ Verified</span>
        </div>
        <div id="storeMeta" style="font-size:13px;color:#64748b;margin-top:4px;display:flex;flex-wrap:wrap;gap:8px;"></div>
        <div id="storeOpenStatus" style="margin-top:6px;font-size:12px;font-weight:700;"></div>
      </div>

      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button id="followBtn" onclick="toggleFollow()" style="display:none;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid #e2e8f0;background:white;color:#0f172a;">
          Follow
        </button>
        <button onclick="startStoreChat()" id="msgStoreBtn" style="display:none;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:#ec5b13;color:white;">
          Message
        </button>
      </div>
    </div>

    <p id="storeDesc" style="font-size:14px;color:#64748b;margin-top:12px;line-height:1.6;"></p>

    <!-- Stats -->
    <div style="display:flex;gap:20px;margin-top:14px;padding:14px;background:var(--bg-secondary);border-radius:12px;flex-wrap:wrap;">
      <div style="text-align:center;">
        <div id="statListings" style="font-size:18px;font-weight:900;color:var(--text-primary);">—</div>
        <div style="font-size:11px;color:#64748b;font-weight:600;">Listings</div>
      </div>
      <div style="text-align:center;">
        <div id="statFollowers" style="font-size:18px;font-weight:900;color:var(--text-primary);">—</div>
        <div style="font-size:11px;color:#64748b;font-weight:600;">Followers</div>
      </div>
      <div style="text-align:center;">
        <div id="statRating" style="font-size:18px;font-weight:900;color:var(--text-primary);">—</div>
        <div style="font-size:11px;color:#64748b;font-weight:600;">Rating</div>
      </div>
    </div>

    <!-- Tabs -->
    <div style="display:flex;gap:6px;margin-top:16px;padding:4px;background:var(--bg-secondary);border-radius:24px;width:fit-content;">
      <button class="tab-btn active" onclick="switchTab('listings',this)">Listings</button>
      <button class="tab-btn" onclick="switchTab('about',this)">About</button>
    </div>

    <!-- Listings Tab -->
    <div id="tab-listings" style="margin-top:16px;">
      <div id="listingsGrid" class="listing-grid"></div>
      <div id="listingsEmpty" style="display:none;text-align:center;padding:40px 20px;color:#94a3b8;">
        <div style="font-size:40px;margin-bottom:8px;">📦</div>
        <p style="font-weight:700;">No active listings</p>
      </div>
      <div id="listingsLoading" style="text-align:center;padding:30px;color:#94a3b8;font-size:13px;">Loading...</div>
      <div id="loadMoreWrap" style="display:none;text-align:center;margin-top:16px;">
        <button onclick="loadMoreListings()" style="padding:10px 24px;border-radius:10px;border:1.5px solid #e2e8f0;background:white;font-size:13px;font-weight:700;cursor:pointer;">Load More</button>
      </div>
    </div>

    <!-- About Tab -->
    <div id="tab-about" style="display:none;margin-top:16px;">
      <div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:16px;padding:20px;">
        <h3 style="font-size:15px;font-weight:800;margin-bottom:12px;color:var(--text-primary);">Working Hours</h3>
        <div id="workingHoursTable" style="font-size:13px;color:#64748b;"></div>
        <div id="storeAddress" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border-color);display:none;">
          <h3 style="font-size:15px;font-weight:800;margin-bottom:6px;color:var(--text-primary);">Location</h3>
          <p id="storeAddressText" style="font-size:13px;color:#64748b;"></p>
        </div>
      </div>
    </div>

  </div>
</main>

<!-- Footer -->
<footer class="footer" style="margin-top:40px;">
  <div class="footer-grid">
    <div><span class="footer-brand">SomBazar</span></div>
  </div>
  <p class="footer-copy">© 2025 SomBazar</p>
</footer>

<script src="assets/app.min.js"></script>
<script>
const STORE_API = '/api/stores.php';
let storeId = null;
let storeSlug = null;
let currentPage = 1;
let totalPages = 1;
let storeOwnerId = null;

async function loadStore() {
  const slug = getParam('slug') || getParam('id');
  if (!slug) { document.body.innerHTML = '<div style="text-align:center;padding:60px;"><h2>Store not found</h2><a href="index.html">Go Home</a></div>'; return; }

  storeSlug = slug;

  try {
    const paramKey = isNaN(slug) ? 'slug' : 'id';
    const _r = await fetch('/api/stores.php?action=get&' + paramKey + '=' + encodeURIComponent(slug));
    const _j = await _r.json();
    if (!_j.success) { showError('Store not found'); return; }
    const s = _j.data;
    storeId = s.id;
    storeOwnerId = s.owner_id;

    // Meta
    document.title = s.store_name + ' — SomBazar';
    document.getElementById('metaDesc').content = s.description || ('Browse ' + s.store_name + ' on SomBazar');

    // Cover & Logo
    if (s.cover_url) document.getElementById('storeCover').src = s.cover_url;
    if (s.logo_url) document.getElementById('storeLogo').src = s.logo_url;
    else document.getElementById('storeLogo').style.display = 'none';

    // Name & badge
    document.getElementById('storeName').textContent = s.store_name;
    if (s.verification_status === 'verified') {
      document.getElementById('storeVerifiedBadge').style.display = 'inline-flex';
    }

    // Meta row
    const metas = [];
    if (s.city) metas.push('📍 ' + s.city);
    if (s.store_type) metas.push('🏪 ' + s.store_type.charAt(0).toUpperCase() + s.store_type.slice(1).replace('_',' '));
    if (s.phone) metas.push('📞 ' + s.phone);
    document.getElementById('storeMeta').textContent = metas.join('  ·  ');

    // Open status
    if (s.open_status) {
      const el = document.getElementById('storeOpenStatus');
      el.textContent = (s.open_status.is_open ? '🟢 ' : '🔴 ') + s.open_status.label;
      el.style.color = s.open_status.is_open ? '#15803d' : '#dc2626';
    }

    // Description
    if (s.description) document.getElementById('storeDesc').textContent = s.description;

    // Stats
    document.getElementById('statListings').textContent = s.listing_count || 0;
    document.getElementById('statFollowers').textContent = s.follower_count || 0;
    document.getElementById('statRating').textContent = s.avg_rating > 0 ? parseFloat(s.avg_rating).toFixed(1) + ' ⭐' : '—';

    // Follow button
    const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
    if (user && user.id !== storeOwnerId) {
      const followBtn = document.getElementById('followBtn');
      followBtn.style.display = 'inline-flex';
      followBtn.textContent = s.is_following ? 'Unfollow' : 'Follow';
      followBtn.style.background = s.is_following ? '#fee2e2' : 'white';
      followBtn.style.color = s.is_following ? '#dc2626' : '#0f172a';
      document.getElementById('msgStoreBtn').style.display = 'inline-flex';
    }

    // Working hours
    renderWorkingHours(s.working_hours);

    // Address
    if (s.address_text) {
      document.getElementById('storeAddress').style.display = 'block';
      document.getElementById('storeAddressText').textContent = s.address_text;
    }

    // Load listings
    loadListings();

  } catch(e) {
    showError('Failed to load store');
  }
}

async function loadListings(page = 1) {
  if (page === 1) document.getElementById('listingsLoading').style.display = 'block';

  try {
    const _lr = await fetch('/api/stores.php?action=listings&store_id=' + storeId + '&page=' + page + '&per_page=12');
    const _lj = await _lr.json();
    document.getElementById('listingsLoading').style.display = 'none';
    if (!_lj.success) return;
    const listings = _lj.data.listings || [];
    const total_pages = _lj.data.total_pages || 1;
    totalPages = total_pages || 1;
    currentPage = page;

    if (page === 1 && listings.length === 0) {
      document.getElementById('listingsEmpty').style.display = 'block';
      return;
    }

    const grid = document.getElementById('listingsGrid');
    listings.forEach(l => {
      const imgs = Array.isArray(l.images) ? l.images : (typeof l.images === 'string' ? JSON.parse(l.images || '[]') : []);
      const img = imgs[0] || '';
      const card = document.createElement('a');
      card.href = 'listing.html?id=' + l.id;
      card.className = 'listing-card';
      card.innerHTML = `
        <div class="listing-img-wrap">
          ${img ? `<img src="${img}" alt="${l.title}" loading="lazy" style="width:100%;height:160px;object-fit:cover;border-radius:12px 12px 0 0;">` : `<div style="width:100%;height:160px;background:#f1f5f9;border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:center;font-size:32px;">${catEmoji(l.category)}</div>`}
        </div>
        <div class="listing-body" style="padding:10px;">
          <div class="listing-title" style="font-weight:700;font-size:13px;color:var(--text-primary);line-height:1.3;margin-bottom:4px;">${l.title}</div>
          <div style="font-weight:800;font-size:14px;color:#ec5b13;">${fmtPrice(l)}</div>
        </div>`;
      grid.appendChild(card);
    });

    document.getElementById('loadMoreWrap').style.display = currentPage < totalPages ? 'block' : 'none';

  } catch(e) {
    document.getElementById('listingsLoading').style.display = 'none';
  }
}

function loadMoreListings() { loadListings(currentPage + 1); }

async function toggleFollow() {
  const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
  if (!user) { window.location.href = 'auth.html'; return; }

  const btn = document.getElementById('followBtn');
  const isFollowing = btn.textContent.trim() === 'Unfollow';
  const action = isFollowing ? 'unfollow' : 'follow';

  try {
    const res = await apiFetch(`${STORE_API}?action=${action}`, {
      method: 'POST',
      body: JSON.stringify({ store_id: storeId })
    });
    if (res.success) {
      const nowFollowing = !isFollowing;
      btn.textContent = nowFollowing ? 'Unfollow' : 'Follow';
      btn.style.background = nowFollowing ? '#fee2e2' : 'white';
      btn.style.color = nowFollowing ? '#dc2626' : '#0f172a';
      // Follower count guncelle
      const cnt = parseInt(document.getElementById('statFollowers').textContent) || 0;
      document.getElementById('statFollowers').textContent = cnt + (nowFollowing ? 1 : -1);
      showToast(nowFollowing ? 'Following this store' : 'Unfollowed', 'success');
    }
  } catch(e) { showToast('Error. Try again.', 'error'); }
}

async function startStoreChat() {
  const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
  if (!user) { window.location.href = 'auth.html'; return; }
  if (!storeOwnerId) return;

  try {
    const res = await apiFetch('/api/messages.php?action=get_or_create', {
      method: 'POST',
      body: JSON.stringify({ otherUserId: storeOwnerId })
    });
    if (res.success) {
      window.location.href = 'messages.html?conv=' + res.data.conversationId;
    }
  } catch(e) { showToast('Error starting chat', 'error'); }
}

function renderWorkingHours(hours) {
  const el = document.getElementById('workingHoursTable');
  if (!hours) { el.textContent = 'Working hours not specified'; return; }

  const days = [
    ['mon','Monday'],['tue','Tuesday'],['wed','Wednesday'],
    ['thu','Thursday'],['fri','Friday'],['sat','Saturday'],['sun','Sunday']
  ];

  const today = ['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];

  let html = '<table style="width:100%;border-collapse:collapse;">';
  days.forEach(([key, label]) => {
    const h = hours[key];
    const isToday = key === today;
    const closed = !h || h.closed;
    const text = closed ? 'Closed' : (h.open + ' – ' + h.close);
    html += `<tr style="${isToday ? 'font-weight:800;color:var(--text-primary);' : ''}">
      <td style="padding:5px 0;width:120px;">${label}</td>
      <td style="padding:5px 0;color:${closed ? '#dc2626' : '#15803d'};">${text}</td>
    </tr>`;
  });
  html += '</table>';
  el.innerHTML = html;
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-listings').style.display = tab === 'listings' ? 'block' : 'none';
  document.getElementById('tab-about').style.display    = tab === 'about'    ? 'block' : 'none';
}

function showError(msg) {
  document.querySelector('main').innerHTML = `<div style="text-align:center;padding:60px 20px;"><div style="font-size:48px;margin-bottom:12px;">🏪</div><h2 style="font-size:18px;font-weight:800;color:#0f172a;margin-bottom:8px;">${msg}</h2><a href="index.html" style="color:#ec5b13;font-weight:700;">← Go Home</a></div>`;
}

loadStore();
</script>
</body>
</html>
