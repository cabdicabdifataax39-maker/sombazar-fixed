<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>(function(){var t=localStorage.getItem('sb_theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ec5b13">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Store — SomBazar</title>
  <meta name="description" content="Browse this store on SomBazar" id="metaDesc">
  <meta id="ogTitle" property="og:title" content="SomBazar Store">
  <meta id="ogDesc" property="og:description" content="Browse listings on SomBazar">
  <link rel="preload" href="assets/style.min.css" as="style">
  <link rel="stylesheet" href="assets/style.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    /* ── Cover & Hero ─────────────────────────────────── */
    .store-hero {
      position: relative;
      width: 100%;
      height: 280px;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    @media(max-width:640px){ .store-hero { height: 200px; } }
    .store-hero-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .store-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.65) 100%);
    }

    /* ── Avatar ───────────────────────────────────────── */
    .store-avatar-wrap {
      position: absolute;
      bottom: -44px; left: 28px;
      z-index: 10;
    }
    .store-avatar {
      width: 88px; height: 88px;
      border-radius: 20px;
      border: 4px solid var(--bg-card, #fff);
      object-fit: cover;
      background: #f1f5f9;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      display: block;
    }
    .store-avatar-fallback {
      width: 88px; height: 88px;
      border-radius: 20px;
      border: 4px solid var(--bg-card, #fff);
      background: linear-gradient(135deg, #ec5b13, #f97316);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 900; color: white;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    [data-theme="dark"] .store-avatar { border-color: #1e293b; }
    [data-theme="dark"] .store-avatar-fallback { border-color: #1e293b; }

    /* ── Info Area ────────────────────────────────────── */
    .store-info {
      padding: 56px 24px 0;
      max-width: 960px;
      margin: 0 auto;
    }
    .store-name {
      font-size: 26px; font-weight: 900;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin: 0 0 4px;
    }
    @media(max-width:640px){ .store-name { font-size: 20px; } }
    .store-tagline {
      font-size: 13px; color: #64748b;
      line-height: 1.6; margin-bottom: 16px;
      max-width: 480px;
    }
    .verified-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: #dcfce7; color: #15803d;
      font-size: 11px; font-weight: 700;
      padding: 3px 9px; border-radius: 20px;
      margin-left: 6px; vertical-align: middle;
    }
    .store-meta-row {
      display: flex; flex-wrap: wrap; gap: 12px;
      font-size: 12px; color: #64748b;
      margin-bottom: 6px;
    }
    .store-meta-item { display: flex; align-items: center; gap: 4px; }
    .open-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      margin-bottom: 14px;
    }
    .open-badge.open { background: #dcfce7; color: #15803d; }
    .open-badge.closed { background: #fee2e2; color: #dc2626; }

    /* ── Action Buttons ───────────────────────────────── */
    .store-actions {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .btn-follow {
      padding: 9px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; border: 1.5px solid #e2e8f0;
      background: var(--bg-card); color: var(--text-primary);
      display: inline-flex; align-items: center; gap: 6px;
      transition: all .15s;
    }
    .btn-follow:hover { border-color: #ec5b13; color: #ec5b13; }
    .btn-follow.following { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
    .btn-message {
      padding: 9px 20px; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; border: none;
      background: #ec5b13; color: white;
      display: inline-flex; align-items: center; gap: 6px;
      transition: opacity .15s;
    }
    .btn-message:hover { opacity: .88; }
    .btn-share {
      width: 38px; height: 38px; border-radius: 10px;
      border: 1.5px solid #e2e8f0; background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: border-color .15s; color: #64748b;
    }
    .btn-share:hover { border-color: #ec5b13; color: #ec5b13; }

    /* ── Stats ────────────────────────────────────────── */
    .store-stats {
      display: flex; gap: 0;
      margin-bottom: 20px;
    }
    .stat-item {
      flex: 1; text-align: center;
      padding: 14px 8px;
      border-right: 1px solid var(--border-color);
    }
    .stat-item:last-child { border-right: none; }
    .stat-num {
      font-size: 22px; font-weight: 900;
      color: var(--text-primary); display: block;
      line-height: 1.1;
    }
    .stat-lbl {
      font-size: 10px; color: #94a3b8;
      font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; margin-top: 2px; display: block;
    }
    .stats-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    /* ── Tabs ─────────────────────────────────────────── */
    .store-tabs {
      display: flex; gap: 0;
      border-bottom: 2px solid var(--border-color);
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 10px 20px;
      font-size: 13px; font-weight: 700;
      border: none; background: transparent;
      color: #94a3b8; cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all .15s;
    }
    .tab-btn.active { color: #ec5b13; border-bottom-color: #ec5b13; }
    .tab-btn:hover:not(.active) { color: var(--text-primary); }

    /* ── Listing Grid ─────────────────────────────────── */
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media(max-width:640px){
      .listings-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }
    @media(min-width:960px){
      .listings-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .listing-card-store {
      border-radius: 14px;
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      text-decoration: none;
      display: block;
      transition: transform .2s, box-shadow .2s;
      position: relative;
    }
    .listing-card-store:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,.1); }
    .listing-img-wrap { position: relative; }
    .listing-img-wrap img {
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover; display: block;
    }
    .listing-img-placeholder {
      width: 100%; aspect-ratio: 4/3;
      background: var(--bg-secondary);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    .listing-price-badge {
      position: absolute; bottom: 10px; right: 10px;
      background: rgba(0,0,0,0.75);
      color: white; font-weight: 800; font-size: 13px;
      padding: 4px 10px; border-radius: 8px;
      backdrop-filter: blur(4px);
    }
    .listing-featured-badge {
      position: absolute; top: 8px; left: 8px;
      background: #ec5b13; color: white;
      font-size: 9px; font-weight: 800;
      padding: 3px 8px; border-radius: 6px;
      letter-spacing: .5px; text-transform: uppercase;
    }
    .listing-card-body { padding: 10px 12px 12px; }
    .listing-card-title {
      font-size: 13px; font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3; margin-bottom: 4px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .listing-card-meta {
      font-size: 11px; color: #94a3b8;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── Heart Btn ────────────────────────────────────── */
    .heart-btn {
      position: absolute; top: 8px; right: 8px;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.9);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: transform .15s;
      backdrop-filter: blur(4px);
    }
    .heart-btn:hover { transform: scale(1.2); }

    /* ── About Tab ────────────────────────────────────── */
    .about-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 14px; padding: 20px;
      margin-bottom: 14px;
    }
    .about-card h3 {
      font-size: 13px; font-weight: 800;
      color: var(--text-primary); margin: 0 0 12px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .hours-row {
      display: flex; justify-content: space-between;
      padding: 6px 0; font-size: 13px;
      border-bottom: 1px solid var(--border-color);
    }
    .hours-row:last-child { border-bottom: none; }
    .hours-row.today { font-weight: 800; }

    /* ── Load More ────────────────────────────────────── */
    .load-more-btn {
      display: block; width: 100%;
      padding: 13px; margin: 20px 0;
      border: 1.5px solid var(--border-color);
      border-radius: 12px; background: var(--bg-card);
      color: var(--text-primary); font-size: 13px;
      font-weight: 700; cursor: pointer;
      font-family: inherit; transition: border-color .15s;
      text-align: center;
    }
    .load-more-btn:hover { border-color: #ec5b13; color: #ec5b13; }

    /* ── Empty / Loading ──────────────────────────────── */
    .empty-state {
      text-align: center; padding: 60px 20px;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; color: #64748b; }

    /* ── Dark mode ────────────────────────────────────── */
    [data-theme="dark"] .listing-price-badge { background: rgba(0,0,0,0.85); }
    [data-theme="dark"] .btn-follow { border-color: #334155; }
    [data-theme="dark"] .btn-share { border-color: #334155; }
    [data-theme="dark"] .heart-btn { background: rgba(30,41,59,0.9); color: white; }
  </style>
</head>
<body>

<header class="header">
  <nav class="nav-container">
    <a href="index.html" class="logo">SomBazar</a>
    <div class="header-actions" id="headerActions"></div>
  </nav>
</header>

<div style="max-width:960px;margin:0 auto;padding-bottom:60px;">

  <!-- Hero Cover -->
  <div class="store-hero" id="storeHero">
    <img id="storeCoverImg" class="store-hero-img" src="" alt="Store cover" style="display:none;" onerror="this.style.display='none'">
    <div class="store-hero-overlay"></div>
    <!-- Avatar -->
    <div class="store-avatar-wrap">
      <img id="storeLogoImg" class="store-avatar" src="" alt="Store logo" style="display:none;" onerror="this.style.display='none'">
      <div id="storeLogoFallback" class="store-avatar-fallback" style="display:none;"></div>
    </div>
  </div>

  <!-- Info -->
  <div class="store-info">

    <!-- Name row -->
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
      <div style="flex:1;min-width:0;">
        <h1 class="store-name" id="storeName">
          <span id="storeNameText"></span>
          <span id="storeVerifiedBadge" class="verified-badge" style="display:none;">✅ Verified</span>
        </h1>
        <div class="store-meta-row" id="storeMeta"></div>
        <div id="storeOpenStatus" style="margin-bottom:10px;"></div>
        <p class="store-tagline" id="storeDesc"></p>
      </div>
      <!-- Actions -->
      <div class="store-actions" style="flex-shrink:0;">
        <button id="followBtn" class="btn-follow" onclick="toggleFollow()" style="display:none;">
          <span class="material-symbols-outlined" style="font-size:16px;">add</span>
          Follow
        </button>
        <button id="msgStoreBtn" class="btn-message" onclick="startStoreChat()" style="display:none;">
          <span class="material-symbols-outlined" style="font-size:16px;">chat</span>
          Message
        </button>
        <button class="btn-share" onclick="shareStore()" title="Share">
          <span class="material-symbols-outlined" style="font-size:18px;">share</span>
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-card">
      <div class="store-stats">
        <div class="stat-item">
          <span class="stat-num" id="statListings">—</span>
          <span class="stat-lbl">Listings</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="statFollowers">—</span>
          <span class="stat-lbl">Followers</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="statRating">—</span>
          <span class="stat-lbl">Rating</span>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="store-tabs">
      <button class="tab-btn active" onclick="switchTab('listings',this)" id="tabBtnListings">Listings</button>
      <button class="tab-btn" onclick="switchTab('about',this)" id="tabBtnAbout">About</button>
    </div>

    <!-- Listings Tab -->
    <div id="tabListings">
      <div class="listings-grid" id="listingsGrid"></div>
      <div id="listingsLoading" style="text-align:center;padding:40px;color:#94a3b8;font-size:13px;">
        <div style="display:inline-block;width:20px;height:20px;border:2px solid #ec5b13;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;"></div>
      </div>
      <div id="listingsEmpty" class="empty-state" style="display:none;">
        <div class="icon">📦</div>
        <h3>No active listings</h3>
        <p>This store hasn't posted any listings yet.</p>
      </div>
      <button id="loadMoreBtn" class="load-more-btn" onclick="loadMoreListings()" style="display:none;">
        Load More Listings
      </button>
    </div>

    <!-- About Tab -->
    <div id="tabAbout" style="display:none;">
      <div class="about-card">
        <h3>Working Hours</h3>
        <div id="workingHoursTable"></div>
      </div>
      <div class="about-card" id="locationCard" style="display:none;">
        <h3>Location</h3>
        <p id="storeAddressText" style="font-size:13px;color:#64748b;margin:0;"></p>
      </div>
    </div>

  </div>
</div>

<!-- Footer -->
<footer class="footer">
  <div class="footer-grid">
    <div><span class="footer-brand">SomBazar</span></div>
  </div>
  <p class="footer-copy">© 2025 SomBazar</p>
</footer>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="assets/app.min.js"></script>
<script>
const STORE_API = '/api/stores.php';
let storeId = null;
let storeSlug = null;
let currentPage = 1;
let totalPages = 1;
let storeOwnerId = null;
let isFollowingStore = false;

async function loadStore() {
  const slug = getParam('slug') || getParam('id');
  if (!slug) {
    document.querySelector('.store-hero').innerHTML = '<div style="text-align:center;padding:80px;color:white;"><h2>Store not found</h2><a href="index.html" style="color:#ec5b13;">Go Home</a></div>';
    return;
  }
  storeSlug = slug;

  try {
    const paramKey = isNaN(slug) ? 'slug' : 'id';
    const _r = await fetch('/api/stores.php?action=get&' + paramKey + '=' + encodeURIComponent(slug));
    const _j = await _r.json();
    if (!_j.success) { showError('Store not found'); return; }
    const s = _j.data;

    storeId = s.id;
    storeOwnerId = s.owner_id;
    isFollowingStore = !!s.is_following;

    // Meta
    document.title = s.store_name + ' — SomBazar';
    document.getElementById('metaDesc').content = s.description || ('Browse ' + s.store_name + ' on SomBazar');
    document.getElementById('ogTitle').content = s.store_name + ' — SomBazar';
    document.getElementById('ogDesc').content = s.description || ('Browse ' + s.store_name + ' on SomBazar');

    // Cover
    if (s.cover_url) {
      const img = document.getElementById('storeCoverImg');
      img.src = s.cover_url;
      img.style.display = 'block';
    }

    // Logo
    const initial = (s.store_name || 'S')[0].toUpperCase();
    if (s.logo_url) {
      const logoImg = document.getElementById('storeLogoImg');
      logoImg.src = s.logo_url;
      logoImg.style.display = 'block';
      logoImg.onerror = function() {
        this.style.display = 'none';
        showFallbackLogo(initial);
      };
    } else {
      showFallbackLogo(initial);
    }

    // Name
    document.getElementById('storeNameText').textContent = s.store_name;
    if (s.verification_status === 'verified') {
      document.getElementById('storeVerifiedBadge').style.display = 'inline-flex';
    }

    // Meta row
    const metaEl = document.getElementById('storeMeta');
    if (s.city) metaEl.innerHTML += `<span class="store-meta-item">📍 ${s.city}</span>`;
    if (s.store_type) metaEl.innerHTML += `<span class="store-meta-item">🏪 ${s.store_type.charAt(0).toUpperCase() + s.store_type.slice(1).replace('_',' ')}</span>`;
    if (s.phone) metaEl.innerHTML += `<span class="store-meta-item">📞 ${s.phone}</span>`;

    // Open status
    if (s.open_status) {
      const el = document.getElementById('storeOpenStatus');
      const isOpen = s.open_status.is_open;
      el.innerHTML = `<span class="open-badge ${isOpen ? 'open' : 'closed'}">${isOpen ? '🟢' : '🔴'} ${s.open_status.label}</span>`;
    }

    // Description
    if (s.description) document.getElementById('storeDesc').textContent = s.description;

    // Stats
    document.getElementById('statListings').textContent = s.listing_count || 0;
    document.getElementById('statFollowers').textContent = s.follower_count || 0;
    document.getElementById('statRating').textContent = s.avg_rating > 0 ? parseFloat(s.avg_rating).toFixed(1) + ' ⭐' : '—';

    // Follow/Message buttons
    const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
    if (user && user.id !== storeOwnerId) {
      const followBtn = document.getElementById('followBtn');
      followBtn.style.display = 'inline-flex';
      updateFollowBtn(isFollowingStore);
      document.getElementById('msgStoreBtn').style.display = 'inline-flex';
    }

    // Working hours
    renderWorkingHours(s.working_hours);

    // Address
    if (s.address_text) {
      document.getElementById('locationCard').style.display = 'block';
      document.getElementById('storeAddressText').textContent = s.address_text;
    }

    // Load listings
    loadListings();

  } catch(e) {
    showError('Failed to load store');
  }
}

function showFallbackLogo(initial) {
  const fb = document.getElementById('storeLogoFallback');
  fb.textContent = initial;
  fb.style.display = 'flex';
}

function updateFollowBtn(following) {
  const btn = document.getElementById('followBtn');
  if (following) {
    btn.className = 'btn-follow following';
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">check</span> Following';
  } else {
    btn.className = 'btn-follow';
    btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:16px;">add</span> Follow';
  }
}

async function loadListings(page = 1) {
  if (page === 1) {
    document.getElementById('listingsLoading').style.display = 'block';
    document.getElementById('listingsGrid').innerHTML = '';
  }

  try {
    const _lr = await fetch('/api/stores.php?action=listings&store_id=' + storeId + '&page=' + page + '&per_page=12');
    const _lj = await _lr.json();
    document.getElementById('listingsLoading').style.display = 'none';
    if (!_lj.success) return;

    const listings = _lj.data.listings || _lj.data || [];
    const tp = _lj.data.total_pages || 1;
    totalPages = tp;
    currentPage = page;

    if (page === 1 && listings.length === 0) {
      document.getElementById('listingsEmpty').style.display = 'block';
      return;
    }

    const grid = document.getElementById('listingsGrid');
    listings.forEach(l => {
      const imgs = Array.isArray(l.images) ? l.images : [];
      const img = imgs[0] || null;
      const price = l.price ? ('USD ' + parseFloat(l.price).toLocaleString()) : '';
      const isFeatured = l.featured || l.is_featured;
      const card = document.createElement('a');
      card.href = 'listing.html?id=' + l.id;
      card.className = 'listing-card-store';
      card.innerHTML = `
        <div class="listing-img-wrap">
          ${img
            ? `<img src="${img}" alt="${l.title || ''}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\'listing-img-placeholder\'>${catEmoji(l.category)}</div>'">`
            : `<div class="listing-img-placeholder">${catEmoji(l.category)}</div>`
          }
          ${isFeatured ? '<div class="listing-featured-badge">FEATURED</div>' : ''}
          ${price ? `<div class="listing-price-badge">${price}</div>` : ''}
          <button class="heart-btn" onclick="event.preventDefault();toggleFav(${l.id},this)" title="Save">♡</button>
        </div>
        <div class="listing-card-body">
          <div class="listing-card-title">${l.title || ''}</div>
          <div class="listing-card-meta">
            ${l.city ? `<span>📍 ${l.city}</span>` : ''}
            ${l.condition ? `<span>• ${l.condition}</span>` : ''}
          </div>
        </div>`;
      grid.appendChild(card);
    });

    document.getElementById('loadMoreBtn').style.display = currentPage < totalPages ? 'block' : 'none';

  } catch(e) {
    document.getElementById('listingsLoading').style.display = 'none';
  }
}

function loadMoreListings() { loadListings(currentPage + 1); }

async function toggleFollow() {
  const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
  if (!user) { window.location.href = 'auth.html?redirect=' + encodeURIComponent(location.href); return; }

  const action = isFollowingStore ? 'unfollow' : 'follow';
  try {
    const _r = await fetch('/api/stores.php?action=' + action, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('sb_token') || '') },
      body: JSON.stringify({ store_id: storeId })
    });
    const _j = await _r.json();
    if (_j.success) {
      isFollowingStore = !isFollowingStore;
      updateFollowBtn(isFollowingStore);
      const cnt = parseInt(document.getElementById('statFollowers').textContent) || 0;
      document.getElementById('statFollowers').textContent = cnt + (isFollowingStore ? 1 : -1);
      showToast(isFollowingStore ? '✅ Following this store' : 'Unfollowed', isFollowingStore ? 'success' : 'info');
    }
  } catch(e) { showToast('Error. Try again.', 'error'); }
}

async function startStoreChat() {
  const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
  if (!user) { window.location.href = 'auth.html?redirect=' + encodeURIComponent(location.href); return; }
  if (!storeOwnerId) return;
  try {
    const _r = await fetch('/api/messages.php?action=get_or_create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('sb_token') || '') },
      body: JSON.stringify({ otherUserId: storeOwnerId })
    });
    const _j = await _r.json();
    if (_j.success && _j.data && _j.data.conversationId) {
      window.location.href = 'messages.html?conv=' + _j.data.conversationId;
    }
  } catch(e) { showToast('Error starting chat', 'error'); }
}

function shareStore() {
  const url = location.href;
  if (navigator.share) {
    navigator.share({ title: document.getElementById('storeNameText').textContent, url });
  } else {
    navigator.clipboard.writeText(url).then(() => showToast('Link copied!', 'success'));
  }
}

async function toggleFav(id, btn) {
  const user = JSON.parse(localStorage.getItem('sb_user') || 'null');
  if (!user) { window.location.href = 'auth.html'; return; }
  try {
    const _r = await fetch('/api/favorites.php?action=toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('sb_token') || '') },
      body: JSON.stringify({ listing_id: id })
    });
    const _j = await _r.json();
    if (_j.success) btn.textContent = _j.data && _j.data.favorited ? '♥' : '♡';
  } catch(e) {}
}

function renderWorkingHours(hours) {
  const el = document.getElementById('workingHoursTable');
  if (!hours) { el.innerHTML = '<p style="font-size:13px;color:#94a3b8;">Not specified</p>'; return; }
  const days = [['mon','Monday'],['tue','Tuesday'],['wed','Wednesday'],['thu','Thursday'],['fri','Friday'],['sat','Saturday'],['sun','Sunday']];
  const today = ['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];
  el.innerHTML = days.map(([key, label]) => {
    const h = hours[key];
    const isToday = key === today;
    const closed = !h || h.closed;
    const text = closed ? '<span style="color:#dc2626;">Closed</span>' : `<span style="color:#15803d;">${h.open} – ${h.close}</span>`;
    return `<div class="hours-row ${isToday ? 'today' : ''}">
      <span style="color:var(--text-primary);">${label}${isToday ? ' <span style="font-size:10px;background:#ec5b13;color:white;padding:1px 5px;border-radius:4px;">Today</span>' : ''}</span>
      ${text}
    </div>`;
  }).join('');
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabListings').style.display = tab === 'listings' ? 'block' : 'none';
  document.getElementById('tabAbout').style.display = tab === 'about' ? 'block' : 'none';
}

function showError(msg) {
  document.querySelector('.store-hero').innerHTML = `<div style="text-align:center;padding:60px;color:white;"><div style="font-size:48px;margin-bottom:12px;">🏪</div><h2>${msg}</h2><a href="index.html" style="color:#ec5b13;font-weight:700;">← Go Home</a></div>`;
}

loadStore();
