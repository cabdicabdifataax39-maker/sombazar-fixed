<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f97316">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Profile — SomBazar</title>
  <meta name="description" content="View seller profile on SomBazar" id="metaDesc">
  <meta property="og:title"       content="Seller Profile — SomBazar" id="ogTitle">
  <meta property="og:description" content="View listings and reviews" id="ogDesc">
  <meta property="og:image"       content="" id="ogImage">
  <meta property="og:type"        content="profile">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f0f; font-family: 'Outfit', sans-serif; overflow-x: hidden; min-height: 100vh; }

    /* ── HERO ──────────────────────────────────────────────── */
    .hero-wrapper {
      position: relative;
      background: #0f0f0f;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(249,115,22,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23f97316' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .hero-inner {
      position: relative; z-index: 1;
      padding: 48px 24px 100px;
      text-align: center;
      max-width: 680px;
      margin: 0 auto;
    }

    /* Avatar */
    .avatar-ring {
      position: relative;
      width: 110px; height: 110px;
      margin: 0 auto 20px;
    }
    .avatar-ring::before {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #f97316, #fb923c, #fed7aa, #f97316);
      animation: spin 4s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar-inner {
      position: absolute; inset: 3px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 3px solid #0f0f0f;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; font-weight: 900; color: white;
      z-index: 1;
    }
    .avatar-inner img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-online {
      position: absolute; bottom: 6px; right: 6px; z-index: 2;
      width: 16px; height: 16px; border-radius: 50%;
      background: #22c55e;
      border: 3px solid #0f0f0f;
    }

    .hero-name {
      font-size: 28px; font-weight: 800; color: #fff;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .hero-location {
      font-size: 13px; color: rgba(255,255,255,.45);
      display: flex; align-items: center; justify-content: center; gap: 4px;
      margin-bottom: 14px;
    }
    .hero-badges {
      display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
      margin-bottom: 0;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 100px;
      font-size: 11px; font-weight: 700; letter-spacing: .3px;
    }
    .badge-verified { background: rgba(34,197,94,.15); color: #4ade80; border: 1px solid rgba(34,197,94,.25); }
    .badge-member   { background: rgba(249,115,22,.12); color: #fb923c; border: 1px solid rgba(249,115,22,.2); }

    /* ── STATS CARD ─────────────────────────────────────────── */
    .stats-card {
      position: relative; z-index: 2;
      max-width: 480px;
      margin: -52px auto 0;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      box-shadow: 0 24px 48px rgba(0,0,0,.5), 0 0 0 1px rgba(249,115,22,.08);
      display: grid; grid-template-columns: repeat(4, 1fr);
      overflow: hidden;
    }
    .stat-cell {
      padding: 18px 8px;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,.06);
      position: relative;
    }
    .stat-cell:last-child { border-right: none; }
    .stat-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px; font-weight: 700; color: #f97316;
      line-height: 1;
    }
    .stat-lbl {
      font-size: 10px; color: rgba(255,255,255,.35);
      font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
      margin-top: 5px;
    }

    /* ── CONTENT ────────────────────────────────────────────── */
    .page-content {
      max-width: 680px; margin: 0 auto;
      padding: 28px 16px 100px;
      animation: fadeUp .4s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

    /* Action Buttons */
    .action-row {
      display: flex; gap: 10px;
      margin-bottom: 24px;
    }
    .btn-msg {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #f97316; color: white;
      border: none; border-radius: 14px;
      padding: 14px 20px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all .2s;
      box-shadow: 0 4px 20px rgba(249,115,22,.35);
    }
    .btn-msg:hover { background: #ea580c; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(249,115,22,.45); }
    .btn-share {
      width: 50px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px; cursor: pointer;
      color: rgba(255,255,255,.6); transition: all .2s;
    }
    .btn-share:hover { background: rgba(255,255,255,.1); color: white; }

    /* Section */
    .section { margin-bottom: 20px; }
    .section-title {
      font-size: 13px; font-weight: 700; letter-spacing: .8px;
      text-transform: uppercase; color: rgba(255,255,255,.3);
      margin-bottom: 12px; padding: 0 2px;
    }
    .dark-card {
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 18px;
      overflow: hidden;
    }

    /* Listings Grid */
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: rgba(255,255,255,.07);
    }
    @media (min-width: 480px) { .listings-grid { grid-template-columns: repeat(3, 1fr); } }

    .listing-tile {
      background: #1a1a1a;
      text-decoration: none; color: inherit;
      display: block; position: relative;
      overflow: hidden;
      transition: background .2s;
    }
    .listing-tile:hover { background: #222; }
    .listing-tile:hover .tile-img img { transform: scale(1.05); }
    .tile-img {
      width: 100%; aspect-ratio: 4/3;
      background: #111;
      overflow: hidden;
    }
    .tile-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s ease; }
    .tile-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: rgba(255,255,255,.1);
    }
    .tile-body { padding: 10px 12px 12px; }
    .tile-title {
      font-size: 12px; font-weight: 600; color: rgba(255,255,255,.8);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .tile-price { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: #f97316; }
    .tile-badge {
      position: absolute; top: 8px; left: 8px;
      background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
      color: white; font-size: 9px; font-weight: 800;
      padding: 2px 7px; border-radius: 6px; letter-spacing: .5px;
      text-transform: uppercase;
    }
    .no-listings {
      padding: 48px 20px; text-align: center;
      color: rgba(255,255,255,.2); font-size: 13px;
    }

    /* Reviews */
    .review-summary {
      padding: 20px;
      display: flex; align-items: center; gap: 20px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .review-big-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 48px; font-weight: 700; color: #f97316;
      line-height: 1;
    }
    .review-stars { display: flex; gap: 3px; margin-bottom: 6px; }
    .star { font-size: 16px; }
    .star.on  { color: #f59e0b; }
    .star.off { color: rgba(255,255,255,.15); }
    .review-label { font-size: 12px; color: rgba(255,255,255,.4); font-weight: 500; }

    .review-item {
      display: flex; gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,.04);
      transition: background .2s;
    }
    .review-item:last-child { border-bottom: none; }
    .review-item:hover { background: rgba(255,255,255,.02); }
    .rev-avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #f97316, #ea580c);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 14px; color: white;
      overflow: hidden;
    }
    .rev-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .rev-name { font-size: 13px; font-weight: 700; color: rgba(255,255,255,.85); }
    .rev-date { font-size: 11px; color: rgba(255,255,255,.25); }
    .rev-comment { font-size: 13px; color: rgba(255,255,255,.5); line-height: 1.6; margin-top: 6px; }
    .rev-stars { display: flex; gap: 2px; margin-top: 2px; }
    .rev-stars .star { font-size: 11px; }

    /* Skeleton */
    .sk { background: linear-gradient(90deg, #222 25%, #2a2a2a 50%, #222 75%); background-size: 200% 100%; animation: sh 1.5s infinite; border-radius: 8px; }
    @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Navbar override for dark */
    .nav-container { background: rgba(15,15,15,.95) !important; border-bottom: 1px solid rgba(255,255,255,.06) !important; backdrop-filter: blur(16px); }
    .logo { color: #f97316 !important; }
    .mobile-bottom-nav { background: rgba(15,15,15,.97) !important; border-top: 1px solid rgba(255,255,255,.06) !important; }
    .mob-nav-btn { color: rgba(255,255,255,.4) !important; }

    /* Page background */
    .page-bg {
      position: fixed; inset: 0; z-index: -1;
      background: #0f0f0f;
    }
    .page-bg::before {
      content: '';
      position: absolute;
      top: 30%; left: -20%;
      width: 60%; height: 60%;
      background: radial-gradient(circle, rgba(249,115,22,.04) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>

  isLoggedIn:  () => !!localStorage.getItem('sb_token'),
  setSession:  (token, user) => { localStorage.setItem('sb_token', token); localStorage.setItem('sb_user', JSON.stringify(user)); },

<script src="assets/app.js"></script>
<script>
const params   = new URLSearchParams(location.search);
const userId   = parseInt(params.get('id') || '0');
let   sellerData = null;

if (!userId) {
  document.body.innerHTML = '<div style="text-align:center;padding:60px;font-size:15px;color:rgba(255,255,255,.4)">User not found. <a href="index.html" style="color:#f97316">Go Home</a></div>';
}

function starsHTML(rating, size = 14) {
  return [1,2,3,4,5].map(i =>
    `<span class="star ${i <= Math.round(rating) ? 'on' : 'off'}" style="font-size:${size}px">★</span>`
  ).join('');
}

async function loadProfile() {
  try {
    const r = await fetch(`api/listings.php?action=list&user_id=${userId}&pageSize=50`);
    const d = await r.json();
    const listings = d.success ? (d.data || []) : [];

    if (listings.length > 0) {
      const l = listings[0];
      sellerData = {
        id:          userId,
        name:        l.seller?.displayName || l.sellerName || l.seller_name  || 'Seller',
        avatar:      l.seller?.photoURL    || l.sellerPhoto || l.seller_photo || null,
        city:        l.seller?.city        || l.sellerCity  || l.city         || 'Somaliland',
        verified:    l.seller?.verified    || l.sellerVerified || l.seller_verified || false,
        memberSince: l.seller?.memberSince || l.sellerMemberSince || null,
      };
    } else {
      sellerData = { id: userId, name: 'Seller', avatar: null, city: 'Somaliland', verified: false };
    }

    renderHero(sellerData, listings.length);
    renderListings(listings);
    loadReviews();

    document.title = `${sellerData.name} — SomBazar`;
    document.getElementById('ogTitle')?.setAttribute('content', `${sellerData.name} — SomBazar`);
    document.getElementById('metaDesc')?.setAttribute('content', `View ${sellerData.name}'s listings and reviews on SomBazar`);
    if (sellerData.avatar) document.getElementById('ogImage')?.setAttribute('content', sellerData.avatar);

  } catch(e) {
    document.getElementById('heroSkeleton').innerHTML =
      '<div style="text-align:center;padding:40px;color:#ef4444">Could not load profile</div>';
  }
}

function renderHero(s, listingCount) {
  document.getElementById('heroSkeleton').style.display = 'none';
  document.getElementById('userHero').style.display = '';
  document.getElementById('actionBar').style.display = 'flex';

  const avatarEl = document.getElementById('heroAvatar');
  if (s.avatar) {
    avatarEl.innerHTML = `<img loading="lazy" src="${s.avatar}" alt="${s.name}">`;
  } else {
    avatarEl.textContent = (s.name || 'S')[0].toUpperCase();
  }

  document.getElementById('heroName').textContent = s.name;

  const metaParts = [];
  if (s.city) metaParts.push(s.city);
  if (s.memberSince) metaParts.push('Member since ' + s.memberSince);
  document.getElementById('heroMetaText').textContent = metaParts.join(' · ');

  const badges = [];
  if (s.verified) badges.push(`<span class="badge badge-verified">✓ Verified</span>`);
  if (s.memberSince) badges.push(`<span class="badge badge-member">Since ${s.memberSince}</span>`);
  document.getElementById('heroBadges').innerHTML = badges.join('');

  document.getElementById('statListings').textContent = listingCount;
  if (s.memberSince) document.getElementById('statMember').textContent = s.memberSince;

  const schema = {
    "@context": "https://schema.org", "@type": "Person",
    "name": s.name, "image": s.avatar || '',
    "address": { "@type": "PostalAddress", "addressLocality": s.city || 'Somaliland' }
  };
  const schemaEl = document.getElementById('userSchema');
  if (schemaEl) schemaEl.textContent = JSON.stringify(schema);

  const me = Auth.getUser();
  if (me && parseInt(me.id) === userId) {
    document.getElementById('actionBar').style.display = 'none';
  }
}

function renderListings(listings) {
  const grid = document.getElementById('listingsGrid');
  const none = document.getElementById('noListings');
  document.getElementById('listingsCount').textContent = listings.length ? `${listings.length}` : '';

  if (!listings.length) {
    grid.style.display = 'none';
    none.style.display = '';
    return;
  }

  grid.innerHTML = listings.slice(0, 12).map(l => {
    const img   = l.images?.[0] || l.image || null;
    const price = l.price ? `${l.currency || 'USD'} ${Number(l.price).toLocaleString()}` : 'Negotiable';
    const isNew = l.createdAt && (Date.now() - new Date(l.createdAt)) < 7*24*3600*1000;
    return `
      <a href="listing.html?id=${l.id}" class="listing-tile">
        <div class="tile-img">
          ${img ? `<img loading="lazy" src="${img}" alt="${l.title}">` : `<div class="tile-placeholder">🏷️</div>`}
        </div>
        ${isNew ? `<div class="tile-badge">New</div>` : ''}
        <div class="tile-body">
          <div class="tile-title">${l.title || 'Listing'}</div>
          <div class="tile-price">${price}</div>
        </div>
      </a>`;
  }).join('');
}

async function loadReviews() {
  const container = document.getElementById('reviewsContainer');
  try {
    const r = await fetch(`api/reviews.php?action=get_seller&seller_id=${userId}`);
    const d = await r.json();
    if (!d.success) throw new Error('failed');
    const { reviews, avg_rating, total } = d.data;

    document.getElementById('statRating').textContent  = avg_rating || '—';
    document.getElementById('statReviews').textContent = total || 0;
    document.getElementById('reviewsCount').textContent = total ? `${total}` : '';

    if (!total) {
      container.innerHTML = '<div class="no-listings" style="padding:36px">No reviews yet</div>';
      return;
    }

    const label = avg_rating >= 4.5 ? '🌟 Excellent Seller' : avg_rating >= 3.5 ? '👍 Good Seller' : '— Average';

    const summaryHTML = `
      <div class="review-summary">
        <div class="review-big-num">${avg_rating}</div>
        <div>
          <div class="review-stars">${starsHTML(avg_rating, 18)}</div>
          <div class="review-label">${label} · ${total} review${total !== 1 ? 's' : ''}</div>
        </div>
      </div>`;

    const reviewsHTML = reviews.map(rev => {
      const date = new Date(rev.createdAt).toLocaleDateString('en', {year:'numeric', month:'short', day:'numeric'});
      const avEl = rev.reviewerAvatar
        ? `<img loading="lazy" src="${rev.reviewerAvatar}" style="width:100%;height:100%;object-fit:cover">`
        : `<span>${(rev.reviewerName || '?')[0].toUpperCase()}</span>`;
      return `
        <div class="review-item">
          <div class="rev-avatar">${avEl}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
              <div>
                <div class="rev-name">${rev.reviewerName || 'Anonymous'}</div>
                <div class="rev-stars">${starsHTML(rev.rating, 11)}</div>
              </div>
              <div class="rev-date">${date}</div>
            </div>
            ${rev.comment ? `<p class="rev-comment">${rev.comment}</p>` : ''}
          </div>
        </div>`;
    }).join('');

    container.innerHTML = summaryHTML + reviewsHTML;

  } catch(e) {
    container.innerHTML = '<div style="padding:24px;color:rgba(255,255,255,.2);font-size:13px;text-align:center">Could not load reviews</div>';
  }
}

async function sendMessage() {
  if (!Auth.isLoggedIn()) {
    window.location.href = `auth.html?redirect=${encodeURIComponent(location.href)}`;
    return;
  }
  const me = Auth.getUser();
  if (me && parseInt(me.id) === userId) {
    showToast('Cannot message yourself', 'error');
    return;
  }
  try {
    const r = await fetch('api/messages.php?action=get_or_create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + Auth.getToken() },
      body: JSON.stringify({ otherUserId: userId, listingId: null })
    });
    const d = await r.json();
    if (d.success) {
      window.location.href = `messages.html?conv=${d.data.conversationId}`;
    } else {
      window.location.href = 'messages.html';
    }
  } catch(e) {
    window.location.href = 'messages.html';
  }
}

function shareProfile() {
  const url  = location.href;
  const name = sellerData?.name || 'Seller';
  if (navigator.share) {
    navigator.share({ title: `${name} — SomBazar`, url });
  } else {
    navigator.clipboard.writeText(url).then(() => showToast('Link copied!', 'success'));
  }
}

if (userId) {
  loadProfile();
  document.addEventListener('DOMContentLoaded', () => {
    const u = Auth.getUser();
    if (u) {
      document.getElementById('header-signin').style.display = 'none';
      const hu = document.getElementById('header-user');
      hu.style.display = 'flex';
      const av = hu.querySelector('.header-avatar');
      if (av) {
        if (u.photoURL) {
          av.innerHTML = `<img src="${u.photoURL}" style="width:32px;height:32px;border-radius:50%;object-fit:cover">`;
        } else {
          av.textContent = (u.displayName || 'U')[0].toUpperCase();
        }
      }
    }
    if (typeof Notif !== 'undefined' && Auth.isLoggedIn()) Notif.init();
  });
}
