<script src="assets/app.js"></script>
<script>
const params   = new URLSearchParams(location.search);
const userId   = parseInt(params.get('id') || '0');
let   sellerData = null;

if (!userId) {
  document.body.innerHTML = '<div style="text-align:center;padding:60px;font-size:15px;color:#64748b">User not found. <a href="index.html">Go Home</a></div>';
}

async function loadProfile() {
  try {
    // Kullanıcı bilgilerini listings API üzerinden al
    const r = await fetch(`api/listings.php?action=list&user_id=${userId}&pageSize=50`);
    const d = await r.json();
    const listings = d.success ? (d.data || []) : [];

    // İlk listing'den seller bilgisi al
    if (listings.length > 0) {
      const l = listings[0];
      sellerData = {
        id:          userId,
        name:        l.seller?.displayName || l.sellerName || l.seller_name  || 'Seller',
        avatar:      l.seller?.photoURL    || l.sellerPhoto || l.seller_photo || null,
        city:        l.seller?.city        || l.sellerCity  || l.city         || 'Somaliland',
        verified:    l.seller?.verified    || l.sellerVerified || l.seller_verified || false,
        memberSince: l.seller?.memberSince || l.sellerMemberSince || null,
      };
    } else {
      // Listings yok - kullanıcıyı doğrudan çek (auth/me yetersiz, ama user_id ile deneyebiliriz)
      sellerData = { id: userId, name: 'Seller', avatar: null, city: 'Somaliland', verified: false };
    }

    renderHero(sellerData, listings.length);
    renderListings(listings);
    loadReviews();

    // SEO
    document.title = `${sellerData.name} — SomBazar`;
    document.getElementById('ogTitle')?.setAttribute('content', `${sellerData.name} — SomBazar`);
    document.getElementById('metaDesc')?.setAttribute('content', `View ${sellerData.name}'s listings and reviews on SomBazar`);
    if (sellerData.avatar) document.getElementById('ogImage')?.setAttribute('content', sellerData.avatar);

  } catch(e) {
    document.getElementById('heroSkeleton').innerHTML =
      '<div style="text-align:center;padding:40px;color:#ef4444">Could not load profile</div>';
  }
}

function renderHero(s, listingCount) {
  document.getElementById('heroSkeleton').style.display = 'none';
  document.getElementById('userHero').style.display = '';
  document.getElementById('actionBar').style.display = 'flex';

  // Avatar
  const avatarEl = document.getElementById('heroAvatar');
  if (s.avatar) {
    avatarEl.innerHTML = `<img loading="lazy" src="${s.avatar}" alt="${s.name}">`;
  } else {
    avatarEl.textContent = (s.name || 'S')[0].toUpperCase();
  }

  document.getElementById('heroName').textContent = s.name;

  const metaParts = [];
  if (s.city) metaParts.push(' ' + s.city);
  if (s.memberSince) metaParts.push('Member since ' + s.memberSince);
  document.getElementById('heroMeta').textContent = metaParts.join(' · ');

  // Badges
  const badges = [];
  if (s.verified) badges.push('✓ Verified');
  document.getElementById('heroBadges').innerHTML = badges.map(b =>
    `<span class="user-badge">${b}</span>`
  ).join('');

  document.getElementById('statListings').textContent = listingCount;
  // Person schema
  const _uSchema = {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": s.name,
    "image": s.avatar || '',
    "address": { "@type": "PostalAddress", "addressLocality": s.city || 'Somaliland' }
  };
  const _uSchemaEl = document.getElementById('userSchema');
  if (_uSchemaEl) _uSchemaEl.textContent = JSON.stringify(_uSchema);

  // Kendi profiline bakıyorsa "Send Message" gizle
  const me = Auth.getUser();
  if (me && parseInt(me.id) === userId) {
    document.getElementById('actionBar').style.display = 'none';
  }
}

function renderListings(listings) {
  const grid = document.getElementById('listingsGrid');
  const none = document.getElementById('noListings');
  document.getElementById('listingsCount').textContent = listings.length ? `${listings.length} listings` : '';

  if (!listings.length) {
    grid.style.display = 'none';
    none.style.display = '';
    return;
  }
  grid.innerHTML = listings.slice(0, 12).map(l => {
    const img  = l.images?.[0] || l.image || null;
    const price = l.price ? `${l.currency || 'USD'} ${Number(l.price).toLocaleString()}` : 'Price negotiable';
    return `
      <a href="listing.html?id=${l.id}" class="mini-card">
        <div class="mini-card-img">
          ${img ? `<img loading="lazy" src="${img}" alt="${l.title}">` : ''}
        </div>
        <div class="mini-card-body">
          <div class="mini-card-title">${l.title || 'Listing'}</div>
          <div class="mini-card-price">${price}</div>
        </div>
      </a>`;
  }).join('');
}

async function loadReviews() {
  const container = document.getElementById('reviewsContainer');
  try {
    const r = await fetch(`api/reviews.php?action=get_seller&seller_id=${userId}`);
    const d = await r.json();
    if (!d.success) throw new Error('failed');
    const { reviews, avg_rating, total } = d.data;

    document.getElementById('statRating').textContent  = avg_rating || '—';
    document.getElementById('statReviews').textContent = total || 0;
    document.getElementById('reviewsCount').textContent = total ? `${total} reviews` : '';

    if (!total) {
      container.innerHTML = '<div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px">No reviews yet</div>';
      return;
    }

    // Özet bar
    const starsHtml = (rating, size=14) => [1,2,3,4,5].map(i =>
      `<span style="color:${i<=Math.round(rating)?'#f59e0b':'#e2e8f0'};font-size:${size}px">★</span>`
    ).join('');

    const summaryHTML = `
      <div style="display:flex;align-items:center;gap:16px;padding:14px 16px;background:#fffbeb;border-bottom:1px solid #fef3c7">
        <div style="text-align:center">
          <div style="font-size:32px;font-weight:900;color:#f59e0b;line-height:1">${avg_rating}</div>
          <div style="font-size:11px;color:#64748b;margin-top:2px">${total} review${total!==1?'s':''}</div>
        </div>
        <div>
          ${starsHtml(avg_rating, 18)}
          <div style="font-size:12px;color:#64748b;margin-top:4px">
            ${avg_rating >= 4.5 ? ' Excellent Seller' : avg_rating >= 3.5 ? '👍 Good Seller' : ' Average'}
          </div>
        </div>
      </div>`;

    const reviewsHTML = reviews.map(rev => {
      const date    = new Date(rev.createdAt).toLocaleDateString('en', {year:'numeric',month:'short',day:'numeric'});
      const avatarEl = rev.reviewerAvatar
        ? `<img loading="lazy" src="${rev.reviewerAvatar}" style="width:100%;height:100%;object-fit:cover">`
        : `<span style="font-size:15px;font-weight:800">${(rev.reviewerName||'?')[0].toUpperCase()}</span>`;
      return `
        <div class="review-item">
          <div class="review-avatar">${avatarEl}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
              <div>
                <div style="font-weight:700;font-size:13px;color:#1e293b">${rev.reviewerName || 'Anonymous'}</div>
                <div style="margin-top:2px">${starsHtml(rev.rating)}</div>
              </div>
              <div style="font-size:11px;color:#94a3b8;white-space:nowrap">${date}</div>
            </div>
            ${rev.comment ? `<p style="font-size:13px;color:#475569;margin:6px 0 0;line-height:1.5">${rev.comment}</p>` : ''}
          </div>
        </div>`;
    }).join('');

    container.innerHTML = summaryHTML + reviewsHTML;
  } catch(e) {
    container.innerHTML = '<div style="padding:16px;color:#94a3b8;font-size:13px;text-align:center">Could not load reviews</div>';
  }
}

async function sendMessage() {
  if (!Auth.isLoggedIn()) {
    window.location.href = `auth.html?redirect=${encodeURIComponent(location.href)}`;
    return;
  }
  const me = Auth.getUser();
  if (me && parseInt(me.id) === userId) {
    showToast('Cannot message yourself', 'error');
    return;
  }
  try {
    // Varsa ilk listing ile konuşma başlat
    const r = await fetch('api/messages.php?action=get_or_create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + Auth.getToken() },
      body: JSON.stringify({ otherUserId: userId, listingId: null })
    });
    const d = await r.json();
    if (d.success) {
      window.location.href = `messages.html?conv=${d.data.conversationId}`;
    } else {
      window.location.href = 'messages.html';
    }
  } catch(e) {
    window.location.href = 'messages.html';
  }
}

function shareProfile() {
  const url  = location.href;
  const name = sellerData?.name || 'Seller';
  if (navigator.share) {
    navigator.share({ title: `${name} — SomBazar`, url });
  } else {
    navigator.clipboard.writeText(url).then(() => showToast('Link copied!', 'success'));
  }
}

// Init
if (userId) {
  loadProfile();
  // Navbar
  document.addEventListener('DOMContentLoaded', () => {
    const u = Auth.getUser();
    if (u) {
      document.getElementById('header-signin').style.display = 'none';
      const hu = document.getElementById('header-user');
      hu.style.display = 'flex';
      const av = hu.querySelector('.header-avatar');
      if (av) av.textContent = (u.displayName || u.display_name || 'U')[0].toUpperCase();
    }
    if (typeof Notif !== 'undefined' && Auth.isLoggedIn()) Notif.init();
  });
}
